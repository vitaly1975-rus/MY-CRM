/* ── Helpers ── */
const nid  = arr => (arr.reduce((m,x)=>Math.max(m,x.id||0),0))+1;
const now  = () => new Date().toISOString();
const fmtDate = iso => {
  if(!iso) return '';
  const d = new Date(iso);
  return d.toLocaleString('ru-RU',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'});
};
const fmtShort = iso => {
  if(!iso) return '';
  const d = new Date(iso);
  return d.toLocaleString('ru-RU',{day:'2-digit',month:'short',year:'numeric'});
};
const isPast  = iso => iso && new Date(iso) < new Date();
const isFuture = iso => iso && new Date(iso) > new Date();
const fsz  = b => b>1048576?`${(b/1048576).toFixed(1)} MB`:b>1024?`${(b/1024).toFixed(0)} KB`:`${b} B`;
const fext = n => (n.split('.').pop()||'').toUpperCase().slice(0,4)||'FILE';
const safe = v => { if(v==null) return ''; try{ if(typeof v==='number'&&isNaN(v)) return ''; }catch(e){} return String(v).trim(); };
const normName = s => (s||'').toLowerCase().replace(/[«»""''.,\s-]+/g,' ').trim();

function ensureKeys(p) {
  if (!p) return empty();
  return {
    companies: (p.companies||[]).map(c=>({inn:'',tags:[],industries:c.industries||[c.industry].filter(Boolean),...c})),
    contacts:  p.contacts||[],
    deals:     (p.deals||[]).map(d=>({files:[],clientContact:null,...d})),
    projects:  (p.projects||[]).map(pr=>({files:[],milestones:[],participantContactIds:[],...pr})),
    tasks:     (p.tasks||[]).map(t=>({completed:t.completed||false,result:'',...t})),
    actions:   p.actions||[],
    tags:      p.tags||[],
  };
}
function empty() { return {companies:[],contacts:[],deals:[],projects:[],tasks:[],actions:[],tags:[]}; }

function loadData() {
  try {
    const s = localStorage.getItem(SK);
    if(s) { const p=JSON.parse(s); if(p&&Array.isArray(p.companies)) return ensureKeys(p); }
  } catch(e){}
  return empty();
}

const PBadge = ({v}) => v ? <span className={`badge ${v==='A'?'ba':v==='B'?'bb':'bc'}`}>{v}</span> : null;
const SBadge = ({v}) => {
  if(!v) return null;
  const m={'Лид':'s-Лид','Переговоры':'s-Переговоры','КП':'s-КП','Договор':'s-Договор','Закрыт':'s-Закрыт','Отказ':'s-Отказ','Запрос':'s-Запрос','Счёт':'s-Счёт','Оплата':'s-Оплата','Новый':'s-Новый','В работе':'s-В-работе','На паузе':'s-На-паузе','Завершён':'s-Завершён'};
  return <span className={`badge ${m[v]||'s-Лид'}`}>{v}</span>;
};
const IndustriesBadges = ({industries=[]}) => <>{industries.map((ind,i)=><span key={i} className="ind-tag">{ind}</span>)}</>;

function App() {
  const [data, setData]   = useState(loadData);
  const [tab, setTab]     = useState('dashboard');
  const [openCo, setOpenCo]     = useState(null);
  const [openDeal, setOpenDeal] = useState(null);
  const [openProj, setOpenProj] = useState(null);
  const [openTask, setOpenTask] = useState(null);
  const [openCont, setOpenCont] = useState(null);
  const [openAction, setOpenAction] = useState(null);
  const [showTagsFilter, setShowTagsFilter] = useState(false);
  const [activeTagFilter, setActiveTagFilter] = useState(null);
  const [activeTagIds, setActiveTagIds]   = useState([]); 
  const [showImport, setShowImport] = useState(false);
  const [toast, setToast] = useState(null);
  const fileJsonRef = useRef();

  useEffect(()=>{ try{ localStorage.setItem(SK,JSON.stringify(data)); }catch(e){} },[data]);

  const upd = fn => setData(p=>typeof fn==='function'?fn(p):fn);
  const bang = msg => { setToast(msg); setTimeout(()=>setToast(null),2400); };

  const doExport = () => {
    const b=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
    const a=document.createElement('a'); a.href=URL.createObjectURL(b);
    a.download=`crm_backup_${new Date().toISOString().slice(0,10)}.json`; a.click();
    bang('Экспортировано');
  };

  const handleJsonImport = e => {
    const f=e.target.files[0]; if(!f) return;
    const r=new FileReader();
    r.onload=ev=>{ try{
      const parsed=JSON.parse(ev.target.result);
      const structured = ensureKeys(parsed);
      setData(structured);
      setTab('dashboard');
      bang(`Импортировано: ${structured.companies.length} компаний`);
    }catch(err){ alert('Ошибка чтения JSON файла: '+err.message); } };
    r.readAsText(f); e.target.value='';
  };

  const selCo   = openCo   ? data.companies.find(x=>x.id===openCo)   : null;
  const selDeal = openDeal ? data.deals.find(x=>x.id===openDeal)     : null;
  const selProj = openProj ? data.projects.find(x=>x.id===openProj)  : null;
  const selTask = openTask ? data.tasks.find(x=>x.id===openTask)     : null;
  const selCont = openCont ? data.contacts.find(x=>x.id===openCont)  : null;
  const selAction = openAction ? data.actions.find(x=>x.id===openAction) : null;

  const activeTag = activeTagFilter ? data.tags.find(t=>t.id===activeTagFilter) : null;
  const activeTasksCount = data.tasks.filter(t=>!t.completed).length + data.actions.filter(a=>a.planned).length;

  const TABS=[
    {id:'dashboard',icon:'home',label:'Главная'},
    {id:'companies',icon:'company',label:'Компании',cnt:data.companies.length},
    {id:'contacts',icon:'contact',label:'Контакты',cnt:data.contacts.length},
    {id:'deals',icon:'deal',label:'Сделки',cnt:data.deals.length},
    {id:'projects',icon:'project',label:'Проекты',cnt:data.projects.length},
    {id:'tasks',icon:'task',label:'Задачи',cnt:activeTasksCount},
  ];

  return <>
    <div className="tb">
      <div className="brand">Innomatec / LangAn<span className="brand-s">CRM · v6</span></div>
      <div className="sep"/>
      <nav className="nav">
        {TABS.map(t=>(
          <button key={t.id} className={`nb${tab===t.id?' active':''}`} onClick={()=>setTab(t.id)}>
            <I n={t.icon} s={13}/><span>{t.label}</span>
            {t.cnt!=null&&<span className="c">{t.cnt}</span>}
          </button>
        ))}
      </nav>
      <div className="tba">
        {activeTag && (
          <button className="tag-active-chip" onClick={()=>setActiveTagFilter(null)}>🏷 {activeTag.name} ×</button>
        )}
        <button className="btn btn-g btn-sm" onClick={()=>setShowTagsFilter(true)}><I n="tag" s={13}/><span>Теги</span></button>
        <button className="btn btn-g btn-sm" onClick={()=>setShowImport(true)}><I n="xlsx" s={13}/><span>Импорт CSV</span></button>
        
        {/* Кнопка импорта полноценной базы JSON */}
        <button className="btn btn-p btn-sm" style={{background:'#2563eb',borderColor:'#2563eb'}} onClick={()=>fileJsonRef.current?.click()}>
          <I n="ul" s={13}/><span>Импорт JSON</span>
        </button>
        <input type="file" ref={fileJsonRef} accept=".json" style={{display:'none'}} onChange={handleJsonImport}/>
        
        <button className="btn btn-sm" onClick={doExport}><I n="dl" s={13}/><span>Экспорт бэкапа</span></button>
      </div>
    </div>

    <div className="content">
      {data.companies.length === 0 && tab === 'dashboard' ? (
        <div className="empty" style={{padding:'80px 16px'}}>
          <div style={{fontSize:48, marginBottom:16}}>📂</div>
          <div className="et" style={{fontSize:24}}>База данных пуста</div>
          <div className="es" style={{maxWidth:400, margin:'0 auto 20px', fontSize:14, color:'var(--mu)'}}>
            Загрузите сохраненный ранее бэкап CRM в формате .json, чтобы начать работу и протестировать функционал.
          </div>
          <button className="btn btn-p" style={{padding:'8px 16px', background:'#2563eb', borderColor:'#2563eb'}} onClick={()=>fileJsonRef.current?.click()}>
            Выбрать файл .json
          </button>
        </div>
      ) : (
        <>
          {tab==='dashboard' && <Dashboard data={data} setTab={setTab} onOpenAction={id=>setOpenAction(id)} onSelTask={id=>setOpenTask(id)}/>}
          {tab==='companies' && <Companies data={data} upd={upd} onSel={id=>setOpenCo(id)} bang={bang} activeTagFilter={activeTagFilter} activeTagIds={activeTagIds} setActiveTagIds={setActiveTagIds}/>}
          {tab==='contacts'  && <ContactsSearch data={data} onSel={id=>setOpenCont(id)} upd={upd} bang={bang}/>}
          {tab==='deals'     && <Deals data={data} upd={upd} onSel={id=>setOpenDeal(id)} bang={bang}/>}
          {tab==='projects'  && <Projects data={data} upd={upd} onSel={id=>setOpenProj(id)} bang={bang}/>}
          {tab==='tasks'     && <Tasks data={data} upd={upd} onSel={id=>setOpenTask(id)} bang={bang} onOpenAction={id=>setOpenAction(id)}/>}
        </>
      )}
    </div>

    {selCo   && <CoPanel    key={selCo.id}   co={selCo}    data={data} upd={upd} bang={bang} onClose={()=>setOpenCo(null)} onContact={id=>setOpenCont(id)} onDeal={id=>setOpenDeal(id)} onProject={id=>setOpenProj(id)}/>}
    {selDeal && <DealPanel  key={selDeal.id} deal={selDeal} data={data} upd={upd} bang={bang} onClose={()=>setOpenDeal(null)}/>}
    {selProj && <ProjPanel  key={selProj.id} proj={selProj} data={data} upd={upd} bang={bang} onClose={()=>setOpenProj(null)} onContact={id=>setOpenCont(id)}/>}
    {selTask && <TaskPanel  key={selTask.id} task={selTask} data={data} upd={upd} bang={bang} onClose={()=>setOpenTask(null)}/>}
    {selCont && <ContPanel  key={selCont.id} contact={selCont} data={data} upd={upd} bang={bang} onClose={()=>setOpenCont(null)}/>}
    {selAction && <ActionPanel key={selAction.id} action={selAction} data={data} upd={upd} bang={bang} onClose={()=>setOpenAction(null)}/>}
    {showTagsFilter && <TagFilterPanel data={data} upd={upd} onClose={()=>setShowTagsFilter(false)} onSelect={id=>{if(id==='__clear__'){setActiveTagIds([]);}else{setActiveTagIds(prev=>prev.includes(id)?prev.filter(x=>x!==id):[...prev,id]);}setTab('companies');}} bang={bang} selectedTagIds={activeTagIds}/>}
    {showImport && <XlsxImport data={data} upd={upd} onClose={()=>setShowImport(false)} bang={bang}/>}

    {toast && <div className="toast">{toast}</div>}
  </>;
}

/* ── Dashboard ── */
function Dashboard({data,setTab,onOpenAction,onSelTask}) {
  const openTasks = data.tasks.filter(t=>!t.completed).map(t=>({...t, _isTask:true}));
  const plannedActions = data.actions.filter(a=>a.planned).map(a=>({...a, _isAction:true}));
  
  const allUpcoming = [...openTasks, ...plannedActions].sort((a,b)=>{
    const dA = a._isTask ? (a.deadline||'') : (a.plannedDate||'');
    const dB = b._isTask ? (b.deadline||'') : (b.plannedDate||'');
    if(!dA&&!dB) return 0;
    if(!dA) return 1;
    if(!dB) return -1;
    return dA.localeCompare(dB);
  });

  const s = useMemo(()=>({
    cos: data.companies.length,
    prA: data.companies.filter(c=>c.priority==='A').length,
    aDl: data.deals.filter(d=>d.stage!=='Закрыт'&&d.stage!=='Отказ').length,
    aPr: data.projects.filter(p=>p.stage!=='Завершён').length,
    oTk: allUpcoming.length,
    inds: Object.entries(data.companies.reduce((m,c)=>{(c.industries||[c.industry].filter(Boolean)).forEach(ind=>{m[ind||'Не указана']=(m[ind||'Не указана']||0)+1;});return m},{})).sort((a,b)=>b[1]-a[1]).slice(0,6),
  }),[data, allUpcoming.length]);

  const coName=id=>data.companies.find(c=>c.id===id)?.name||'';

  return <>
    <div className="ph"><div><div className="pt">Дашборд</div><div className="pm">{new Date().toLocaleDateString('ru-RU',{day:'numeric',month:'long',year:'numeric'})}</div></div></div>
    <div className="stats">
      {[['Компаний',s.cos,'База','companies'],['Приоритет A',s.prA,'Топ','companies'],['Активных сделок',s.aDl,'В воронке','deals'],['Активных проектов',s.aPr,'В работе','projects'],['Открытых задач',s.oTk,'К выполнению','tasks']].map(([l,v,sub,t])=>(
        <div key={l} className="stat" onClick={()=>setTab(t)}><div className="sl">{l}</div><div className="sv">{v}</div><div className="ss">{sub}</div></div>
      ))}
    </div>
    
    {allUpcoming.length > 0 && <div style={{padding:'0 26px 18px'}}>
      <div style={{fontFamily:'Instrument Serif,serif',fontSize:18,marginBottom:10,display:'flex',alignItems:'center',gap:10}}>📋 Задачи и действия<span style={{fontSize:13,color:'var(--mu)',fontFamily:'Geist,sans-serif'}}>({allUpcoming.length})</span></div>
      <div style={{display:'flex',gap:8,overflowX:'auto',paddingBottom:6}}>
        {allUpcoming.slice(0,20).map(item=>{
          const isTask = item._isTask;
          const overdue = isTask ? (item.deadline&&isPast(item.deadline)) : (item.plannedDate&&isPast(item.plannedDate));
          const co = item.companyId ? coName(item.companyId) : '';
          const contact = item.contactId ? data.contacts.find(c=>c.id===item.contactId)?.name : '';
          const dateStr = isTask ? (item.deadline?fmtDate(item.deadline):'Без срока') : (item.plannedDate?fmtDate(item.plannedDate):'Без срока');
          const title = isTask ? (item.title||'Без названия') : (`${item.type}${contact?` с ${contact}`:''}`);
          const sub = isTask ? item.type : item.content?.split('\n')[0];

          return <div key={(isTask?'t-':'a-')+item.id} style={{minWidth:280,maxWidth:300,padding:'10px 12px',background:'var(--bg-card)',border:'1px solid var(--border)',borderRadius:'var(--r)',cursor:'pointer',borderLeft:overdue?'3px solid var(--red)':'3px solid var(--blue)'}} onClick={()=>isTask ? onSelTask(item.id) : onOpenAction(item.id)}>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:4}}>
              <span style={{fontSize:12,fontFamily:'Geist Mono,monospace',color:overdue?'var(--red)':'var(--blue)',fontWeight:500}}>{dateStr}</span>
              <span style={{fontSize:11,fontFamily:'Geist Mono,monospace',padding:'2px 6px',borderRadius:4,background:'var(--bg-a)',color:'var(--mu)'}}>{isTask?'Задача':'План'}</span>
            </div>
            <div style={{fontSize:14,fontWeight:500,marginBottom:4}}>{title}</div>
            {(co||sub)&&<div style={{fontSize:12,color:'var(--mu)'}}>{co}{co&&sub?' · ':''}{sub}</div>}
          </div>;
        })}
      </div>
    </div>}
    
    <div style={{padding:'0 26px 26px'}}>
      <div style={{fontFamily:'Instrument Serif,serif',fontSize:18,marginBottom:10}}>Топ отраслей</div>
      <table className="tbl"><thead><tr><th>Отрасль</th><th style={{textAlign:'right',width:80}}>Кол-во</th><th style={{width:'38%'}}>Доля</th></tr></thead>
        <tbody>{s.inds.map(([ind,cnt])=>(
          <tr key={ind}><td>{ind}</td><td style={{textAlign:'right',fontFamily:'Geist Mono,monospace'}}>{cnt}</td>
          <td><div className="pbar-w"><div className="pbar" style={{width:`${cnt/s.cos*100}%`}}/></div></td></tr>
        ))}</tbody>
      </table>
    </div>
  </>;
}

const WIDTHS_SK = 'crm_v5_widths';

function loadCols() {
  try { const s=localStorage.getItem(COLS_SK); if(s) return JSON.parse(s); } catch(e){}
  return [...DEFAULT_COLS];
}
function loadWidths() {
  try { const s=localStorage.getItem(WIDTHS_SK); if(s) return JSON.parse(s); } catch(e){}
  return {};
}

function CoCell({colId, c, tags, colWidths}) {
  const w = colWidths[colId];
  const style = {width:w||undefined, minWidth:60, verticalAlign:'top'};
  const inds = c.industries||[c.industry].filter(Boolean);

  if(colId==='name') return (
    <td className="cn" style={{...style,minWidth:80}}>
      {c.name}
      <div className="cs">{c.inn?'ИНН '+c.inn:''}{c.role?' · '+c.role:''}</div>
    </td>
  );
  if(colId==='industries') return (
    <td className="cd" style={{...style,minWidth:80}}>
      <IndustriesBadges industries={inds}/>
    </td>
  );
  if(colId==='applicability') return <td className="cd" style={style}>{c.applicability||'—'}</td>;
  if(colId==='city')    return <td className="cd" style={style}>{c.city||'—'}</td>;
  if(colId==='priority') return <td style={style}><PBadge v={c.priority}/></td>;
  if(colId==='status')  return <td style={style}><SBadge v={c.status||'Лид'}/></td>;
  if(colId==='tags')    return (
    <td style={style}>
      <div style={{display:'flex',flexWrap:'wrap',gap:3}}>
        {(c.tags||[]).map(tid=>{
          const t=tags.find(x=>x.id===tid);
          return t ? <span key={tid} className="badge bt">{t.name}</span> : null;
        })}
      </div>
    </td>
  );
  if(colId==='inn')    return <td className="cd" style={style}>{c.inn||'—'}</td>;
  if(colId==='role')   return <td className="cd" style={style}>{c.role||'—'}</td>;
  if(colId==='phone')  return <td className="cd" style={style}>{c.phone||'—'}</td>;
  if(colId==='email')  return <td className="cd" style={style}>{c.email||'—'}</td>;
  if(colId==='website') {
    const url = c.website||'';
    const display = url.replace('https://','').replace('http://','');
    return (
      <td className="cd" style={style}>
        {url ? <a href={url} target="_blank" rel="noopener noreferrer" onClick={e=>e.stopPropagation()}>{display}</a> : '—'}
      </td>
    );
  }
  if(colId==='description') return <td className="cd" style={{...style,maxWidth:280}}><div style={{maxHeight:52,overflow:'hidden'}}>{c.description||'—'}</div></td>;
  if(colId==='processes')   return <td className="cd" style={{...style,maxWidth:240}}><div style={{maxHeight:52,overflow:'hidden'}}>{c.processes||'—'}</div></td>;
  if(colId==='solutionInnomatec') return <td className="cd" style={{...style,maxWidth:240}}><div style={{maxHeight:52,overflow:'hidden'}}>{c.solutionInnomatec||'—'}</div></td>;
  if(colId==='solutionLangAn') return <td className="cd" style={{...style,maxWidth:240}}><div style={{maxHeight:52,overflow:'hidden'}}>{c.solutionLangAn||'—'}</div></td>;
  if(colId==='comment')   return <td className="cd" style={{...style,maxWidth:200}}><div style={{maxHeight:52,overflow:'hidden'}}>{c.comment||'—'}</div></td>;
  if(colId==='verificationStatus') return <td className="cd" style={style}>{c.verificationStatus||'—'}</td>;
  if(colId==='createdAt') return <td className="cd" style={style}>{c.createdAt?fmtShort(c.createdAt):'—'}</td>;
  return <td style={style}>—</td>;
}

function Companies({data,upd,onSel,bang,activeTagFilter,activeTagIds,setActiveTagIds}) {
  const [q,setQ]           = useState('');
  const [fInd,setFInd]     = useState('');
  const [fPrio,setFPrio]   = useState('');
  const [fSt,setFSt]       = useState('');
  const [showNew,setShowNew]= useState(false);
  const [visibleCols,setVisibleCols] = useState(loadCols);
  const [colWidths,setColWidths]     = useState(loadWidths);
  const [ctxMenu,setCtxMenu]         = useState(null);

  useEffect(()=>{ try{localStorage.setItem(COLS_SK,JSON.stringify(visibleCols));}catch(e){} },[visibleCols]);
  useEffect(()=>{ try{localStorage.setItem(WIDTHS_SK,JSON.stringify(colWidths));}catch(e){} },[colWidths]);

  const startResize=(e,colId,currentW)=>{
    e.preventDefault(); e.stopPropagation();
    const startX=e.clientX;
    const startW=currentW||100;
    const onMove=ev=>{ setColWidths(prev=>({...prev,[colId]:Math.max(60,startW+(ev.clientX-startX))})); };
    const onUp=()=>{ document.removeEventListener('mousemove',onMove); document.removeEventListener('mouseup',onUp); };
    document.addEventListener('mousemove',onMove);
    document.addEventListener('mouseup',onUp);
  };

  const toggleCol=colId=>setVisibleCols(prev=>prev.includes(colId)?prev.filter(c=>c!==colId):[...prev,colId]);

  const list = useMemo(()=>{
    const ql=q.toLowerCase();
    return data.companies.filter(c=>{
      if(q){
        const n=String(c.name||'').toLowerCase();
        const ct=String(c.city||'').toLowerCase();
        const inn=String(c.inn||'').toLowerCase();
        const d=String(c.description||'').toLowerCase();
        if(!n.includes(ql)&&!ct.includes(ql)&&!inn.includes(ql)&&!d.includes(ql)) return false;
      }
      if(fInd){ const inds=c.industries||[c.industry].filter(Boolean); if(!inds.includes(fInd)) return false; }
      if(fPrio && String(c.priority||'')!==fPrio) return false;
      if(fSt   && String(c.status||'Лид')!==fSt)  return false;
      if(activeTagIds&&activeTagIds.length>0){
        const ct=c.tags||[];
        if(!activeTagIds.every(tid=>ct.includes(tid))) return false;
      }
      return true;
    });
  },[data.companies,q,fInd,fPrio,fSt,activeTagIds]);

  const create=form=>{
    const id=nid(data.companies);
    upd(p=>({...p,companies:[{id,...form,tags:[],createdAt:now()},...p.companies]}));
    setShowNew(false); onSel(id); bang('Компания добавлена');
  };

  const activeCols = ALL_COLS.filter(c=>c.always||visibleCols.includes(c.id));
  const tagNames = activeTagIds&&activeTagIds.length>0 ? activeTagIds.map(id=>data.tags.find(t=>t.id===id)?.name).filter(Boolean).join(' + ') : '';

  return <>
    <div className="ph">
      <div>
        <div className="pt">Компании</div>
        <div className="pm">{list.length} из {data.companies.length}{tagNames?' · '+tagNames:''}</div>
      </div>
      <button className="btn btn-p" onClick={()=>setShowNew(true)}><I n="plus" s={14}/> Добавить компанию</button>
    </div>

    <div className="filters">
      <div className="sw">
        <I n="search" s={14}/>
        <input className="si" placeholder="Поиск по названию, ИНН, городу…" value={q} onChange={e=>setQ(e.target.value)}/>
      </div>
      <select className="flt" value={fInd} onChange={e=>setFInd(e.target.value)}>
        <option value="">Все отрасли</option>
        {INDS.map(i=><option key={i} value={i}>{i}</option>)}
      </select>
      <select className="flt" value={fPrio} onChange={e=>setFPrio(e.target.value)}>
        <option value="">Все приоритеты</option>
        {PRIO.map(p=><option key={p} value={p}>Приоритет {p}</option>)}
      </select>
      <select className="flt" value={fSt} onChange={e=>setFSt(e.target.value)}>
        <option value="">Все статусы</option>
        {CO_ST.map(s=><option key={s} value={s}>{s}</option>)}
      </select>
      {activeTagIds&&activeTagIds.length>0 && <button className="btn btn-sm btn-d" onClick={()=>setActiveTagIds([])}>× Теги ({activeTagIds.length})</button>}
    </div>

    <div className="tw" style={{overflowX:'auto'}}>
      {list.length===0
        ? <div className="empty"><div className="et">Ничего не найдено</div><div className="es">Попробуйте изменить фильтры</div></div>
        : <table className="tbl" style={{tableLayout:'auto',width:'max-content',minWidth:'100%'}}>
            <thead>
              <tr onContextMenu={e=>{e.preventDefault();setCtxMenu({x:Math.min(e.clientX,window.innerWidth-240),y:e.clientY});}}>
                {activeCols.map(col=(
                  <th key={col.id} style={{position:'relative',userSelect:'none',width:colWidths[col.id]||undefined,minWidth:60}}>
                    {col.label}
                    <div className="col-resizer" onMouseDown={e=>startResize(e,col.id,colWidths[col.id])} onClick={e=>e.stopPropagation()}/>
                  </th>
                ))}
              </tr>
            </thead>
            <tbody>
              {list.map(c=>(
                <tr key={c.id} className="row" onClick={()=>onSel(c.id)}>
                  {activeCols.map(col=>(
                    <CoCell key={col.id} colId={col.id} c={c} tags={data.tags} colWidths={colWidths}/>
                  ))}
                </tr>
              ))}
            </tbody>
          </table>}
    </div>

    {ctxMenu && <>
      <div style={{position:'fixed',inset:0,zIndex:499}} onClick={()=>setCtxMenu(null)}/>
      <div style={{position:'fixed',left:ctxMenu.x,top:ctxMenu.y,background:'var(--bg-card)',border:'1px solid var(--border)',borderRadius:'var(--rm)',boxShadow:'var(--shl)',zIndex:500,padding:'6px 0',minWidth:220,maxHeight:420,overflowY:'auto'}}>
        <div style={{padding:'6px 14px 8px',fontFamily:'Geist Mono,monospace',fontSize:10,textTransform:'uppercase',letterSpacing:'.07em',color:'var(--so)',borderBottom:'1px solid var(--border)',marginBottom:4}}>Настроить колонки</div>
        {ALL_COLS.map(col=>(
          <div key={col.id} style={{display:'flex',alignItems:'center',gap:10,padding:'6px 14px',cursor:col.always?'default':'pointer'}} onMouseDown={e=>{e.preventDefault();if(!col.always){toggleCol(col.id);}}}>
            <div style={{width:15,height:15,border:'1.5px solid var(--border-s)',borderRadius:3,flexShrink:0,background:(col.always||visibleCols.includes(col.id))?'var(--text)':'transparent',display:'flex',alignItems:'center',justifyContent:'center'}}>
              {(col.always||visibleCols.includes(col.id))&&(
                <svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="3"><polyline points="20 6 9 17 4 12"/></svg>
              )}
            </div>
            <span style={{fontSize:13}}>{col.label}</span>
            {col.always&&<span style={{fontSize:10,color:'var(--so)',marginLeft:'auto'}}>всегда</span>}
          </div>
        ))}
        <div style={{borderTop:'1px solid var(--border)',marginTop:4,padding:'6px 14px'}}>
          <button className="btn btn-g btn-sm" style={{width:'100%'}} onMouseDown={e=>{e.preventDefault();setVisibleCols([...DEFAULT_COLS]);setColWidths({});}}>Сбросить всё</button>
        </div>
      </div>
    </>}

    {showNew && <NewCoForm onClose={()=>setShowNew(false)} onSave={create} data={data}/>}
  </>;
}

/* ── New Company Form ── */
function NewCoForm({onClose,onSave,data}) {
  const [f,setF] = useState({name:'',inn:'',industries:[],applicability:'',role:'',city:'',phone:'',email:'',website:'',description:'',whyRelevant:'',processes:'',applicationPoints:'',solutionInnomatec:'',solutionLangAn:'',inclusionBasis:'',searchTheme:'',source:'',verificationStatus:'',comment:'',priority:'B',status:'Лид'});
  const [dups,setDups] = useState([]);

  useEffect(()=>{
    const name=f.name.trim(); const inn=f.inn.trim();
    if(!name&&!inn){setDups([]);return;}
    const found=data.companies.filter(c=>{
      if(inn&&c.inn&&String(c.inn).trim()===inn) return true;
      if(name.length>2&&normName(c.name).includes(normName(name))) return true;
      return false;
    });
    setDups(found);
  },[f.name,f.inn]);

  const togInd=ind=>setF({...f,industries:f.industries.includes(ind)?f.industries.filter(x=>x!==ind):[...f.industries,ind]});
  const ok=()=>{
    if(!f.name.trim()){alert('Введите название');return;}
    if(dups.length&&!confirm(`Найдены похожие: ${dups.map(d=>d.name).join(', ')}. Всё равно создать?`))return;
    onSave(f);
  };

  return <Ov onClose={onClose}>
    <div className="ph2"><div className="pt2">Новая компания</div>
      <div className="pa"><button className="btn btn-p btn-sm" onClick={ok}><I n="save" s={13}/> Создать</button><button className="btn btn-g btn-ic" onClick={onClose}><I n="x"/></button></div>
    </div>
    <div className="pb">
      {dups.length>0&&<div className="dup-warn"><strong><I n="warn" s={13}/> Возможные дубликаты:</strong>{dups.map(d=><div key={d.id}>· {d.name}{d.inn?` (ИНН ${d.inn})`:''}</div>)}</div>}
      <F l="Название *"><input className="inp" autoFocus value={f.name} onChange={e=>setF({...f,name:e.target.value})} placeholder='ООО "Пример"'/></F>
      <div className="frow">
        <F l="ИНН"><input className="inp" value={f.inn} onChange={e=>setF({...f,inn:e.target.value})} placeholder="1234567890"/></F>
        <F l="Город"><input className="inp" value={f.city} onChange={e=>setF({...f,city:e.target.value})} placeholder="Москва"/></F>
      </div>
      <F l="Отрасли">
        <div style={{display:'flex',flexWrap:'wrap',gap:5}}>
          {INDS.map(ind=><button key={ind} className={`tagbtn${f.industries.includes(ind)?' on':''}`} onClick={()=>togInd(ind)}>{ind}</button>)}
        </div>
      </F>
      <div className="frow">
        <F l="Роль"><input className="inp" value={f.role} onChange={e=>setF({...f,role:e.target.value})} placeholder="Производитель / OEM"/></F>
        <F l="Приоритет"><select className="sel" value={f.priority} onChange={e=>setF({...f,priority:e.target.value})}>{PRIO.map(p=><option key={p} value={p}>{p}</option>)}</select></F>
      </div>
      <F l="Применяемость"><input className="inp" value={f.applicability} onChange={e=>setF({...f,applicability:e.target.value})} placeholder="Innomatec LTC + LangAn LA"/></F>
      <div className="frow">
        <F l="Телефон"><input className="inp" value={f.phone} onChange={e=>setF({...f,phone:e.target.value})} placeholder="+7 ..."/></F>
        <F l="Email"><input className="inp" value={f.email} onChange={e=>setF({...f,email:e.target.value})} placeholder="info@..."/></F>
      </div>
      <F l="Сайт"><input className="inp" value={f.website} onChange={e=>setF({...f,website:e.target.value})} placeholder="https://..."/></F>
      <F l="Что делает"><textarea className="txa" value={f.description} onChange={e=>setF({...f,description:e.target.value})}/></F>
      <F l="Комментарий"><textarea className="txa" value={f.comment} onChange={e=>setF({...f,comment:e.target.value})}/></F>
    </div>
  </Ov>;
}

/* ── Company Panel ── */
function CoPanel({co,data,upd,bang,onClose,onContact,onDeal,onProject}) {
  const [editing,setEditing]=useState(false);
  const [form,setForm]=useState({...co,industries:co.industries||[co.industry].filter(Boolean)});
  const [tab,setTab]=useState('info');
  useEffect(()=>{setForm({...co,industries:co.industries||[co.industry].filter(Boolean)});setEditing(false);},[co.id]);

  const contacts=data.contacts.filter(c=>(c.companyIds||[]).includes(co.id));
  const deals=data.deals.filter(d=>d.companyId===co.id);
  const projects=data.projects.filter(p=>p.companyId===co.id);
  const history=data.actions.filter(a=>a.companyId===co.id||(a.contactId&&contacts.some(c=>c.id===a.contactId))).sort((a,b)=>(b.plannedDate||b.date||'').localeCompare(a.plannedDate||a.date||''));

  const save=()=>{
    const {_pendingTags,...coData} = form;
    const pending = _pendingTags || [];
    let nextId = null;
    const updated = {...coData, industry:(coData.industries||[])[0]||''};
    upd(p=>{
      let globalTags = [...p.tags];
      let companyTagIds = [...(updated.tags||[])];
      const idMap = {};
      for(const pt of pending) {
        const exists = globalTags.find(t=>t.name.toLowerCase()===pt.name.toLowerCase());
        if(exists) { idMap[pt.id] = exists.id; } else {
          const realId = nid(globalTags);
          globalTags.push({id: realId, name: pt.name});
          idMap[pt.id] = realId;
        }
      }
      companyTagIds = companyTagIds.map(id => idMap[id] !== undefined ? idMap[id] : id);
      const finalCo = {...updated, tags: companyTagIds};
      return {...p, tags: globalTags, companies: p.companies.map(x=>x.id===co.id ? finalCo : x)};
    });
    setEditing(false); bang('Сохранено');
  };
  const del=()=>{
    if(!confirm(`Удалить «${co.name}»?`))return;
    upd(p=>({...p,companies:p.companies.filter(x=>x.id!==co.id),contacts:p.contacts.map(c=>({...c,companyIds:(c.companyIds||[]).filter(i=>i!==co.id)})),deals:p.deals.filter(d=>d.companyId!==co.id),projects:p.projects.filter(pr=>pr.companyId!==co.id)}));
    onClose();bang('Удалено');
  };
  const addContact=cd=>{
    const id=nid(data.contacts);
    upd(p=>({...p,contacts:[{id,companyIds:[co.id],name:cd.name||'',position:cd.position||'',phones:cd.phone?[cd.phone]:[],emails:cd.email?[cd.email]:[],telegram:'',whatsapp:'',notes:'',createdAt:now()},...p.contacts]}));
    bang('Контакт добавлен');
  };
  const addDeal=()=>{
    const t=prompt('Название сделки:',`Запрос — ${co.name}`);if(!t)return;
    const id=nid(data.deals);
    upd(p=>({...p,deals:[...p.deals,{id,title:t,companyId:co.id,amount:0,stage:'Запрос',startDate:new Date().toISOString().slice(0,10),endDate:'',description:'',files:[],createdAt:now()}]}));
    bang('Сделка создана');
  };
  const PTABS=[{id:'info',l:'Информация'},{id:'contacts',l:'Контакты',cnt:contacts.length},{id:'deals',l:'Сделки',cnt:deals.length},{id:'projects',l:'Проекты',cnt:projects.length},{id:'history',l:'Задачи',cnt:history.length}];

  return <Ov onClose={onClose}>
    <div className="ph2">
      <div className="pt2">{editing?<input value={form.name} onChange={e=>setForm({...form,name:e.target.value})}/>:co.name}</div>
      <div className="pa">
        {editing
          ?<><button className="btn btn-p btn-sm" onClick={save}><I n="save" s={13}/> Сохранить</button><button className="btn btn-g btn-sm" onClick={()=>{setForm({...co,industries:co.industries||[]});setEditing(false);}}>Отмена</button></>
          :<><button className="btn btn-g btn-ic" onClick={()=>setEditing(true)}><I n="edit"/></button><button className="btn btn-g btn-ic btn-d" onClick={del}><I n="trash"/></button><button className="btn btn-g btn-ic" onClick={onClose}><I n="x"/></button></>}
      </div>
    </div>
    <div className="ptabs">{PTABS.map(t=><button key={t.id} className={`ptab${tab===t.id?' active':''}`} onClick={()=>setTab(t.id)}>{t.l}{t.cnt!=null&&<span className="c">{t.cnt}</span>}</button>)}</div>
    <div className="pb">
      {tab==='info'     && <CoInfoTab     co={co} form={form} setForm={setForm} editing={editing} data={data} upd={upd}/>}
      {tab==='contacts' && <CoContactsTab contacts={contacts} co={co} onOpen={onContact} onAdd={addContact}/>}
      {tab==='deals'    && <CoDealsTab    deals={deals} onOpen={onDeal} onAdd={addDeal}/>}
      {tab==='projects' && <CoProjsTab    projects={projects} onOpen={onProject} co={co} data={data} upd={upd} bang={bang}/>}
      {tab==='history'  && <CoHistoryTab  history={history} contacts={contacts} co={co} data={data} upd={upd} bang={bang}/>}
    </div>
  </Ov>;
}

/* ── CoInfoTab ── */
function CoInfoTab({co,form,setForm,editing,data,upd}) {
  const ev=(k,v)=>setForm({...form,[k]:v});
  const Fv=({k,label,multi=false})=><F l={label}>{editing?(multi?<textarea className="txa" value={form[k]||''} onChange={e=>ev(k,e.target.value)}/>:<input className="inp" value={form[k]||''} onChange={e=>ev(k,e.target.value)}/>):<div className="fv" style={multi?{whiteSpace:'pre-wrap'}:{}}>{co[k]||<span className="fv dim">—</span>}</div>}</F>;
  const togInd=ind=>setForm({...form,industries:form.industries.includes(ind)?form.industries.filter(x=>x!==ind):[...form.industries,ind]});
  const inds=co.industries||[co.industry].filter(Boolean);
  return <>
    <div className="frow">
      <F l="Приоритет">{editing?<select className="sel" value={form.priority||'B'} onChange={e=>ev('priority',e.target.value)}>{PRIO.map(p=><option key={p} value={p}>{p}</option>)}</select>:<div className="fv"><PBadge v={co.priority}/></div>}</F>
      <F l="Статус">{editing?<select className="sel" value={form.status||'Лид'} onChange={e=>ev('status',e.target.value)}>{CO_ST.map(s=><option key={s} value={s}>{s}</option>)}</select>:<div className="fv"><SBadge v={co.status||'Лид'}/></div>}</F>
    </div>
    <F l="Отрасли">{editing
      ?<div style={{display:'flex',flexWrap:'wrap',gap:5}}>{INDS.map(ind=><button key={ind} className={`tagbtn${form.industries.includes(ind)?' on':''}`} onClick={()=>togInd(ind)}>{ind}</button>)}</div>
      :<div className="fv"><IndustriesBadges industries={inds}/></div>}
    </F>
    <F l="Теги компании">
      <TagsField companyTags={form.tags||[]} pendingTags={form._pendingTags||[]} allTags={data.tags} onChange={(newTags, newPending)=>setForm({...form, tags:newTags, _pendingTags:newPending})}/>
    </F>
    <div className="frow">
      <Fv k="inn" label="ИНН"/><Fv k="city" label="Город"/>
    </div>
    <Fv k="role" label="Роль компании"/>
    <Fv k="applicability" label="Применяемость продукции"/>
    <div className="sdiv"><div className="stitle">Контакты компании</div></div>
    <div className="frow">
      <F l="Телефон">{editing?<input className="inp" value={form.phone||''} onChange={e=>ev('phone',e.target.value)}/>:<div className="fv">{co.phone?<a href={`tel:${co.phone}`}>{co.phone}</a>:<span className="fv dim">—</span>}</div>}</F>

  return <>

        <div key={a.id} className="card planned">
          <div className="ch">

              {pr&&<span className="cd">· {pr.title}</span>}
            </div>
            <span className="plan-badge"><I n="cal" s={11}/> {fmtDate(a.plannedDate)}</span>
          </div>
          <div className="cs2" style={{whiteSpace:'pre-wrap'}}>{a.content}</div>
        </div>);})}
    </>}
    {past.length>0&&<>
      {planned.length>0&&<div style={{fontFamily:'Geist Mono,monospace',fontSize:10,textTransform:'uppercase',letterSpacing:'.07em',color:'var(--mu)',marginBottom:6,marginTop:12}}>История</div>}
      {past.map(a=>{const ct=a.contactId?ctById(a.contactId):null;const pr=a.projectId?prById(a.projectId):null;return(
        <div key={a.id} className="card">
          <div className="ch">
            <div style={{display:'flex',alignItems:'center',gap:7,flexWrap:'wrap'}}>
              <span className={`atype at-${a.type}`}>{a.type}</span>
              {ct&&<span className="cd">с {ct.name}</span>}
              {pr&&<span className="cd">· {pr.title}</span>}
            </div>
            <span className="cm">{fmtDate(a.date||a.plannedDate)}</span>
          </div>
          <div className="cs2" style={{whiteSpace:'pre-wrap'}}>{a.content}</div>
        </div>);})}
    </>}
    {history.length===0&&<div className="empty" style={{padding:'36px 0'}}><div className="et" style={{fontSize:17}}>Записей нет</div><div className="es">Добавьте запись или запланируйте действие</div></div>}
    {showF&&<NewActionForm contacts={contacts} projects={data.projects.filter(p=>p.companyId===co.id)} data={data} onClose={()=>setShowF(false)}

}

/* ── Contacts Search ── */
function ContactsSearch({data,onSel,upd,bang}) {
  const [q,setQ]=useState('');
  const [showNew,setShowNew]=useState(false);
  const coName=ids=>(ids||[]).map(id=>data.companies.find(c=>c.id===id)?.name).filter(Boolean).join(', ')||'—';

    if(!q.trim()) return [];
    const ql=q.toLowerCase();
    return data.contacts.filter(c=>(c.name||'').toLowerCase().includes(ql)||(c.position||'').toLowerCase().includes(ql)||(c.phones||[]).some(p=>(p||'').includes(ql))||(c.emails||[]).some(e=>(e||'').toLowerCase().includes(ql)));
  },[data.contacts,q]);
  const create=cd=>{const id=nid(data.contacts);upd(p=>({...p,contacts:[{id,companyIds:[],name:cd.name||'',position:cd.position||'',phones:cd.phone?[cd.phone]:[],emails:cd.email?[cd.email]:[],telegram:'',whatsapp:'',notes:'',createdAt:now()},...p.contacts]}));setShowNew(false);bang('Контакт добавлен');};
  return <>
    <div className="ph"><div><div className="pt">Контакты</div><div className="pm">Поиск · {data.contacts.length} записей</div></div><button className="btn btn-p" onClick={()=>setShowNew(true)}><I n="plus" s={14}/> Добавить</button></div>
    <div className="filters"><div className="sw" style={{maxWidth:480}}><I n="search" s={14}/><input className="si" autoFocus placeholder="Имя, должность, телефон, email…" value={q} onChange={e=>setQ(e.target.value)}/></div></div>
    <div className="tw">
      {!q.trim()?<div className="empty"><div className="et">Введите запрос для поиска</div><div className="es">Контакты привязаны к компаниям. Откройте компанию, чтобы добавить контакт.</div></div>
      :list.length===0?<div className="empty"><div className="et">Ничего не найдено</div></div>

        <tbody>{list.map(c=><tr key={c.id} className="row" onClick={()=>onSel(c.id)}>

          <td className="cd">{c.phones?.[0]||'—'}</td><td className="cd">{c.emails?.[0]||'—'}</td>
          <td className="cd">{fmtShort(c.createdAt)}</td>
        </tr>)}</tbody>

  </>;
}

/* ── Contact Panel ── */
function ContPanel({contact,data,upd,bang,onClose}) {
  const [editing,setEditing]=useState(false);
  const [tab,setTab]=useState('info');
  const [showAct,setShowAct]=useState(false);
  const [form,setForm]=useState({...contact,phones:contact.phones?.length?[...contact.phones]:[''],emails:contact.emails?.length?[...contact.emails]:[''],companyIds:contact.companyIds||[]});
  useEffect(()=>{setForm({...contact,phones:contact.phones?.length?[...contact.phones]:[''],emails:contact.emails?.length?[...contact.emails]:[''],companyIds:contact.companyIds||[]});setEditing(false);},[contact.id]);
  const actions=data.actions.filter(a=>a.contactId===contact.id).sort((a,b)=>(b.date||b.plannedDate||'').localeCompare(a.date||a.plannedDate||''));
  const save=()=>{const c={...form,phones:form.phones.filter(p=>p?.trim()),emails:form.emails.filter(e=>e?.trim())};upd(p=>({...p,contacts:p.contacts.map(x=>x.id===contact.id?c:x)}));setEditing(false);bang('Сохранено');};
  const del=()=>{if(!confirm(`Удалить «${contact.name}»?`))return;upd(p=>({...p,contacts:p.contacts.filter(x=>x.id!==contact.id),actions:p.actions.filter(a=>a.contactId!==contact.id)}));onClose();bang('Удалено');};
  const ev=(k,v)=>setForm({...form,[k]:v});
  const coName=id=>data.companies.find(c=>c.id===id)?.name||'?';
  return <Ov onClose={onClose}>
    <div className="ph2">
      <div className="pt2">{editing?<input value={form.name||''} onChange={e=>ev('name',e.target.value)} placeholder="ФИО"/>:contact.name||'(без имени)'}</div>
      <div className="pa">
        {editing?<><button className="btn btn-p btn-sm" onClick={save}><I n="save" s={13}/> Сохранить</button><button className="btn btn-g btn-sm" onClick={()=>{setForm({...contact});setEditing(false);}}>Отмена</button></>
        :<><button className="btn btn-g btn-ic" onClick={()=>setEditing(true)}><I n="edit"/></button><button className="btn btn-g btn-ic btn-d" onClick={del}><I n="trash"/></button><button className="btn btn-g btn-ic" onClick={onClose}><I n="x"/></button></>}
      </div>
    </div>
    <div className="ptabs">
      <button className={`ptab${tab==='info'?' active':''}`} onClick={()=>setTab('info')}>Информация</button>
      <button className={`ptab${tab==='actions'?' active':''}`} onClick={()=>setTab('actions')}>Действия<span className="c">{actions.length}</span></button>
    </div>
    <div className="pb">
      {tab==='info'&&<>
        <F l="ФИО / Имя">{editing?<input className="inp" value={form.name||''} onChange={e=>ev('name',e.target.value)} placeholder="Иванов Иван Иванович"/>:<div className="fv">{contact.name||<span className="fv dim">—</span>}</div>}</F>
        <F l="Должность">{editing?<input className="inp" value={form.position||''} onChange={e=>ev('position',e.target.value)}/>:<div className="fv">{contact.position||<span className="fv dim">—</span>}</div>}</F>
        <div className="sdiv"><div className="stitle">Компании ({(form.companyIds||[]).length})</div></div>
        {(form.companyIds||[]).map(cid=><div key={cid} className="card"><div className="ch"><div className="ct">{coName(cid)}</div>{editing&&<button className="btn btn-g btn-ic btn-d btn-sm" onClick={()=>ev('companyIds',(form.companyIds||[]).filter(x=>x!==cid))}><I n="x" s={13}/></button>}</div></div>)}
        {editing&&<select className="sel" style={{marginBottom:10}} onChange={e=>{if(!e.target.value)return;const id=parseInt(e.target.value);if(!(form.companyIds||[]).includes(id)){ev('companyIds',[...(form.companyIds||[]),id]);}e.target.value='';}}>
          <option value="">+ Привязать компанию…</option>{data.companies.filter(c=>!(form.companyIds||[]).includes(c.id)).map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
        </select>}
        <div className="sdiv"><div className="stitle">Связь</div></div>
        <F l="Телефоны">{editing?<>{form.phones.map((p,i)=><div key={i} style={{display:'flex',gap:5,marginBottom:4}}><input className="inp" value={p} onChange={e=>{const a=[...form.phones];a[i]=e.target.value;ev('phones',a);}}/><button className="btn btn-g btn-ic" onClick={()=>ev('phones',form.phones.filter((_,j)=>j!==i))}><I n="x" s={13}/></button></div>)}<button className="btn btn-g btn-sm" onClick={()=>ev('phones',[...form.phones,''])}>+ Ещё</button></>
        :<div className="fv">{contact.phones?.length?contact.phones.map((p,i)=><div key={i}><a href={`tel:${p}`}>{p}</a></div>):<span className="fv dim">—</span>}</div>}</F>
        <F l="Email">{editing?<>{form.emails.map((e,i)=><div key={i} style={{display:'flex',gap:5,marginBottom:4}}><input className="inp" type="email" value={e} onChange={ev2=>{const a=[...form.emails];a[i]=ev2.target.value;ev('emails',a);}}/><button className="btn btn-g btn-ic" onClick={()=>ev('emails',form.emails.filter((_,j)=>j!==i))}><I n="x" s={13}/></button></div>)}<button className="btn btn-g btn-sm" onClick={()=>ev('emails',[...form.emails,''])}>+ Ещё</button></>
        :<div className="fv">{contact.emails?.length?contact.emails.map((e,i)=><div key={i}><a href={`mailto:${e}`}>{e}</a></div>):<span className="fv dim">—</span>}</div>}</F>
        <div className="frow">
          <F l="Telegram">{editing?<input className="inp" value={form.telegram||''} onChange={e=>ev('telegram',e.target.value)} placeholder="@username"/>:<div className="fv">{contact.telegram||<span className="fv dim">—</span>}</div>}</F>
          <F l="WhatsApp">{editing?<input className="inp" value={form.whatsapp||''} onChange={e=>ev('whatsapp',e.target.value)} placeholder="+7 ..."/>:<div className="fv">{contact.whatsapp||<span className="fv dim">—</span>}</div>}</F>
        </div>
        <F l="Заметки">{editing?<textarea className="txa" value={form.notes||''} onChange={e=>ev('notes',e.target.value)}/>:<div className="fv" style={{whiteSpace:'pre-wrap'}}>{contact.notes||<span className="fv dim">—</span>}</div>}</F>
        {contact.createdAt&&<div className="date-stamp">Добавлен: {fmtDate(contact.createdAt)}</div>}
      </>}
      {tab==='actions'&&<>
        <div className="stitle">Действия <button className="btn btn-p btn-sm" onClick={()=>setShowAct(true)}><I n="plus" s={12}/> Добавить</button></div>
        {actions.length===0?<div className="empty" style={{padding:'36px 0'}}><div className="et" style={{fontSize:17}}>Пусто</div></div>
        :actions.map(a=><div key={a.id} className={`card${a.planned&&isFuture(a.plannedDate)?' planned':''}`}>
          <div className="ch">
            <span className={`atype at-${a.type}`}>{a.type}</span>
            {a.planned&&<span className={`plan-badge${isPast(a.plannedDate)?' past':''}`}><I n="cal" s={11}/> {fmtDate(a.plannedDate)}</span>}
            {!a.planned&&<span className="cm">{fmtDate(a.date)}</span>}
          </div>
          <div className="cs2" style={{whiteSpace:'pre-wrap'}}>{a.content}</div>
          {a.createdAt&&<div className="date-stamp">Записано: {fmtDate(a.createdAt)}</div>}
        </div>)}
        {showAct&&<NewActionForm contacts={[contact]} defaultContactId={contact.id} data={data} onClose={()=>setShowAct(false)}
          onSave={ad=>{const id=nid(data.actions);const cid=(form.companyIds||[])[0]||null;upd(p=>({...p,actions:[{id,companyId:cid,contactId:contact.id,projectId:ad.projectId||null,type:ad.type,content:ad.content,planned:ad.planned||false,plannedDate:ad.plannedDate||null,date:ad.planned?null:now(),createdAt:now()},...p.actions]}));setShowAct(false);bang('Добавлено');}}/>}
      </>}
    </div>
  </Ov>;
}

/* ── Deals ── */
function Deals({data,upd,onSel,bang}) {

  return <>
    <div className="ph"><div><div className="pt">Сделки</div><div className="pm">{data.deals.length} в воронке</div></div><button className="btn btn-p" onClick={add}><I n="plus" s={14}/> Новая</button></div>
    <div className="kanban">{DEAL_ST.map(s=><div key={s} className="kol">
      <div className="kh"><span className="ktt">{s}</span><span className="kc">{byS[s]?.length||0}</span></div>
      {(byS[s]||[]).map(d=><div key={d.id} className="kcard" onClick={()=>onSel(d.id)}>
        <div className="kct">{d.title}</div><div className="cs2" style={{marginBottom:4}}>{coN(d.companyId)}</div>
        <div className="kcm"><span>{d.amount?`${(d.amount/1000).toFixed(0)}k ₽`:'—'}</span><span>{(d.files||[]).length>0?`📎${d.files.length}`:''}</span></div>
        {d.createdAt&&<div className="date-stamp">{fmtShort(d.createdAt)}</div>}
      </div>)}
      {!byS[s]?.length&&<div style={{padding:'16px 8px',color:'var(--so)',fontSize:12,textAlign:'center'}}>Пусто</div>}
    </div>)}</div>
  </>;

/* ── Tasks ── */
function Tasks({data,upd,onSel,bang,onOpenAction}) {
  const [flt,setFlt]=useState('open');
  const [type,setType]=useState('all'); 
  
  const list=useMemo(()=>{
    let items = [];
    if(type==='all'||type==='tasks') { items = [...items, ...data.tasks.map(t=>({...t,itemType:'task'}))]; }
    if(type==='all'||type==='actions') { items = [...items, ...data.actions.filter(a=>a.planned).map(a=>({...a,itemType:'action',completed:false}))]; }
    if(flt==='open') items=items.filter(t=>!t.completed);
    if(flt==='done') items=items.filter(t=>t.completed);
    
    return items.sort((a,b)=>{
      if(a.completed!==b.completed) return a.completed?1:-1;
      const dateA = a.itemType==='task'?(a.deadline||''):(a.plannedDate||'');
      const dateB = b.itemType==='task'?(b.deadline||''):(b.plannedDate||'');
      if(!dateA&&!dateB) return 0;
      if(!dateA) return 1;
      if(!dateB) return -1;
      return dateA.localeCompare(dateB);
    });
  },[data.tasks,data.actions,flt,type]);
  
  const coN=id=>data.companies.find(c=>c.id===id)?.name;
  const prN=id=>data.projects.find(p=>p.id===id)?.title;
  const contN=id=>data.contacts.find(c=>c.id===id)?.name;
  
  const add=()=>{const t=prompt('Задача:');if(!t)return;const id=nid(data.tasks);upd(p=>({...p,tasks:[{id,title:t,companyId:null,projectId:null,deadline:'',priority:'Средний',completed:false,description:'',createdAt:now()},...p.tasks]}));onSel(id);};
  const tog=item=>{ if(item.itemType==='task') { upd(p=>({...p,tasks:p.tasks.map(x=>x.id===item.id?{...x,completed:!x.completed}:x)})); } };
  
  return <>
    <div className="ph"><div><div className="pt">Задачи</div><div className="pm">{list.length} в списке</div></div><button className="btn btn-p" onClick={add}><I n="plus" s={14}/> Новая задача</button></div>
    <div className="filters">
      <select className="flt" value={type} onChange={e=>setType(e.target.value)}>
        <option value="all">Всё (Задачи + Действия)</option>
        <option value="tasks">Только Задачи</option>
        <option value="actions">Только Планы</option>
      </select>
      <select className="flt" value={flt} onChange={e=>setFlt(e.target.value)}>
        <option value="open">Открытые</option>
        <option value="done">Выполненные</option>
        <option value="all">Все</option>
      </select>
    </div>
    <div className="tw">
      {list.length===0?<div className="empty"><div className="et">Ничего нет</div></div>
      :list.map(item=><div key={`${item.itemType}-${item.id}`} className="tr">
        {item.itemType==='task' ? (
          <div className={`tck${item.completed?' done':''}`} onClick={e=>{e.stopPropagation();tog(item);}}>
            {item.completed&&<svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3"><polyline points="20 6 9 17 4 12"/></svg>}
          </div>
        ) : (
          <div style={{width:18,height:18,flexShrink:0,display:'flex',alignItems:'center',justifyContent:'center',marginTop:1}}>
            <span className={`atype at-${item.type}`} style={{fontSize:9,padding:'1px 4px'}}>{item.type[0]}</span>
          </div>
        )}
        <div className="tc3" onClick={()=>item.itemType==='task'?onSel(item.id):onOpenAction(item.id)}>
          <div className={`tt${item.completed?' done':''}`}>{item.itemType==='task' ? item.title : item.content.split('\n')[0]}</div>
          <div className="tm">
            {item.itemType==='task' ? <>
                {item.deadline&&<span>📅 {fmtDate(item.deadline)}</span>}
                {item.priority&&<span>⚡ {item.priority}</span>}
                {item.companyId&&coN(item.companyId)&&<span>🏢 {coN(item.companyId)}</span>}
                {item.projectId&&prN(item.projectId)&&<span>📁 {prN(item.projectId)}</span>}
              </> : <>
                <span className={`atype at-${item.type}`}>{item.type}</span>
                {item.plannedDate&&<span>📅 {fmtDate(item.plannedDate)}</span>}
                {item.companyId&&coN(item.companyId)&&<span>🏢 {coN(item.companyId)}</span>}
                {item.contactId&&contN(item.contactId)&&<span>👤 {contN(item.contactId)}</span>}
              </>}
          </div>
        </div>
      </div>)}
    </div>
  </>;
}

/* ── Action Panel ── */
function ActionPanel({action,data,upd,bang,onClose}) {
  const [form,setForm]=useState({...action});
  const [showReport,setShowReport]=useState(false);
  const [report,setReport]=useState('');
  useEffect(()=>setForm({...action}),[action.id]);

  const company = action.companyId ? data.companies.find(c=>c.id===action.companyId) : null;
  const contact = action.contactId ? data.contacts.find(c=>c.id===action.contactId) : null;

  const save = () => { upd(p=>({...p,actions:p.actions.map(a=>a.id===action.id?form:a)})); bang('Сохранено'); onClose(); };
  const del = () => { if(!confirm('Удалить действие?')) return; upd(p=>({...p,actions:p.actions.filter(a=>a.id!==action.id)})); onClose(); bang('Удалено'); };
  const complete = () => {
    if(!report.trim()) { alert('Введите отчет'); return; }
    upd(p=>({...p,actions:p.actions.map(a=>a.id===action.id?{...a,planned:false,date:now(),content:a.content+'\n\n[Отчет]\n'+report}:a)}));
    onClose(); bang('Действие завершено');
  };

  return <Ov onClose={onClose}>
    <div className="ph2">
      <div className="pt2">{action.planned?'План':'История'}: {action.type}</div>
      <div className="pa">
        {action.planned && !showReport && <button className="btn btn-p btn-sm" onClick={()=>setShowReport(true)}><I n="check" s={13}/> Завершить</button>}
        {!showReport && <button className="btn btn-p btn-sm" onClick={save}><I n="save" s={13}/> Сохранить</button>}
        {!showReport && <button className="btn btn-g btn-ic btn-d" onClick={del}><I n="trash"/></button>}
        <button className="btn btn-g btn-ic" onClick={onClose}><I n="x"/></button>
      </div>
    </div>
    <div className="pb">
      {showReport ? <>
        <F l="Отчет о выполнении *"><textarea className="txa" autoFocus value={report} onChange={e=>setReport(e.target.value)} placeholder="Результаты, договоренности..." style={{minHeight:120}}/></F>
        <div className="df"><button className="btn btn-g" onClick={()=>setShowReport(false)}>Отмена</button><button className="btn btn-p" onClick={complete}>Завершить действие</button></div>
      </> : <>
        <F l="Тип"><select className="sel" value={form.type} onChange={e=>setForm({...form,type:e.target.value})}>{ACT_T.map(t=><option key={t} value={t}>{t}</option>)}</select></F>
        <F l="Содержание"><textarea className="txa" value={form.content} onChange={e=>setForm({...form,content:e.target.value})} style={{minHeight:120}}/></F>
      </>}
    </div>
  </Ov>;
}

            const cnt=data.companies.filter(c=>(c.tags||[]).includes(t.id)).length;
            const isSelected=sel.includes(t.id);
            return <div key={t.id} className="card" style={{display:'flex',alignItems:'center',gap:10,cursor:'pointer',borderColor:isSelected?'var(--purple)':'var(--border)',background:isSelected?'var(--pbg)':'var(--bg-card)'}} onClick={()=>onSelect(t.id)}>
              <span className="badge bt" style={{flex:1}}>{t.name}</span><span className="cm">{cnt} фирм</span>
            </div>;
          })}
    </div>
    <div className="df">{sel.length>0 && <button className="btn btn-d btn-sm" onClick={()=>onSelect('__clear__')}>Сбросить</button>}<button className="btn btn-p" onClick={onClose}>Применить</button></div>
  </div></div>;
}

/* ── CSV Import ── */
function XlsxImport({data,upd,onClose,bang}) {
  const [preview,setPreview]=useState(null);
  const [mapping,setMapping]=useState({});
  const [rawRows,setRawRows]=useState([]);
  const [headers,setHeaders]=useState([]);
  const ref=useRef();
  const FIELDS=[{k:'name',l:'Компания *',req:true},{k:'inn',l:'ИНН'},{k:'city',l:'Город'},{k:'phone',l:'Телефон'},{k:'email',l:'Email'},{k:'website',l:'Сайт'},{k:'description',l:'Что делает'}];
  
  const readFile=f=>{const r=new FileReader();r.onload=e=>{try{const text=e.target.result;const lines=text.split('\n').filter(l=>l.trim());if(lines.length<2)return;const sep=lines[0].includes('\t')?'\t':',';
    const hdrs=lines[0].split(sep).map(h=>h.trim());const rows=lines.slice(1).map(l=>l.split(sep).map(v=>v.trim()));
    setHeaders(hdrs);setRawRows(rows);setPreview(rows.slice(0,3));}catch(err){alert(err.message);}};r.readAsText(f,'utf-8');};

  const doImport=()=>{if(!mapping.name)return;let added=0;const newCos=[...data.companies];
    rawRows.forEach(row=>{const name=row[headers.indexOf(mapping.name)];if(!name)return;
      newCos.push({id:nid(newCos),name,status:'Лид',industries:[],tags:[],createdAt:now()});added++;});
    upd(p=>({...p,companies:newCos}));onClose();bang(`Добавлено: ${added}`);};

  return <div className="dlg-ov" onClick={onClose}><div className="dlg" onClick={e=>e.stopPropagation()}>
    <div className="dh"><div style={{fontFamily:'Instrument Serif,serif',fontSize:19}}>Импорт из CSV</div><button className="btn btn-g btn-ic" onClick={onClose}><I n="x"/></button></div>
    <div className="db">
      {!preview?<div className="fdrop" onClick={()=>ref.current?.click()}>Выбрать CSV файл</div>
      :<>
        <F l="Колонка названия"><select className="sel" onChange={e=>setMapping({name:e.target.value})}><option value="">—</option>{headers.map(h=><option key={h} value={h}>{h}</option>)}</select></F>
        <button className="btn btn-p" style={{width:'100%', marginTop:10}} onClick={doImport}>Загрузить строк: {rawRows.length}</button>
      </>}
      <input type="file" ref={ref} accept=".csv" style={{display:'none'}  } onChange={e=>e.target.files[0]&&readFile(e.target.files[0])}/>
    </div>
  </div></div>;
}
