/* ══ Projects ══ */

function Projects({data,upd,onSel,bang}) {

  const byS=useMemo(()=>{const g={};PROJ_ST.forEach(s=>g[s]=[]);data.projects.forEach(p=>{(g[p.stage||'Новый']=g[p.stage||'Новый']||[]).push(p);});return g;},[data.projects]);

  const coN=id=>data.companies.find(c=>c.id===id)?.name||'—';

  const [showN,setShowN]=useState(false);

  return <>

    <div className="ph"><div><div className="pt">Проекты</div><div className="pm">{data.projects.length} проектов</div></div><button className="btn btn-p" onClick={()=>setShowN(true)}><I n="plus" s={14}/> Новый</button></div>

    <div className="kanban">{PROJ_ST.map(s=><div key={s} className="kol">

      <div className="kh"><span className="ktt">{s}</span><span className="kc">{byS[s]?.length||0}</span></div>

      {(byS[s]||[]).map(p=><div key={p.id} className="kcard" onClick={()=>onSel(p.id)}>

        <div className="kct">{p.title}</div><div className="cs2" style={{marginBottom:4}}>{coN(p.companyId)}</div>

        <div className="kcm"><span>{p.budget?`${(p.budget/1000).toFixed(0)}k ₽`:'—'}</span><span>{(p.files||[]).length>0?`📎${p.files.length}`:''} {(p.participantContactIds||[]).length>0?`👥${p.participantContactIds.length}`:''}</span></div>

        {p.createdAt&&<div className="date-stamp">{fmtShort(p.createdAt)}</div>}

      </div>)}

      {!byS[s]?.length&&<div style={{padding:'16px 8px',color:'var(--so)',fontSize:12,textAlign:'center'}}>Пусто</div>}

    </div>)}</div>

    {showN&&<NewProjectForm contacts={data.contacts} companies={data.companies} onClose={()=>setShowN(false)}

      onSave={pd=>{const id=nid(data.projects);upd(p=>({...p,projects:[...p.projects,{id,...pd,files:[],createdAt:now()}]}));setShowN(false);onSel(id);bang('Проект создан');}}/>}

  </>;

}



/* ══ Project Panel ══ */

function ProjPanel({proj,data,upd,bang,onClose,onContact}) {

  const [editing,setEditing]=useState(false);

  const [tab,setTab]=useState('info');

  const [form,setForm]=useState({...proj,participantContactIds:proj.participantContactIds||[],milestones:proj.milestones||[],files:proj.files||[]});

  useEffect(()=>{setForm({...proj,participantContactIds:proj.participantContactIds||[],milestones:proj.milestones||[],files:proj.files||[]});setEditing(false);},[proj.id]);

  const co=data.companies.find(c=>c.id===proj.companyId);

  const participants=(form.participantContactIds||[]).map(id=>data.contacts.find(c=>c.id===id)).filter(Boolean);

  const available=proj.companyId?data.contacts.filter(c=>(c.companyIds||[]).includes(proj.companyId)):data.contacts;

  const mileProg=form.milestones.length?Math.round(form.milestones.filter(m=>m.done).length/form.milestones.length*100):0;

  const save=()=>{upd(p=>({...p,projects:p.projects.map(x=>x.id===proj.id?form:x)}));setEditing(false);bang('Сохранено');};

  const del=()=>{if(!confirm('Удалить проект?'))return;upd(p=>({...p,projects:p.projects.filter(x=>x.id!==proj.id)}));onClose();bang('Удалено');};

  const addMile=()=>{const t=prompt('Этап:');if(!t)return;setForm({...form,milestones:[...form.milestones,{id:Date.now(),title:t,done:false,createdAt:now()}]});};

  const togP=id=>setForm({...form,participantContactIds:form.participantContactIds.includes(id)?form.participantContactIds.filter(x=>x!==id):[...form.participantContactIds,id]});

  const PTABS=[{id:'info',l:'Информация'},{id:'participants',l:'Участники',cnt:participants.length},{id:'milestones',l:'Этапы',cnt:form.milestones.length},{id:'files',l:'Документы',cnt:(form.files||[]).length}];

  return <Ov onClose={onClose}>

    <div className="ph2">

      <div className="pt2">{editing?<input value={form.title} onChange={e=>setForm({...form,title:e.target.value})}/>:proj.title}</div>

      <div className="pa">

        <button className="btn btn-g btn-sm" onClick={()=>exportProjWord(proj,data)}><I n="word" s={13}/> Word</button>

        {editing?<><button className="btn btn-p btn-sm" onClick={save}><I n="save" s={13}/> Сохранить</button><button className="btn btn-g btn-sm" onClick={()=>{setForm({...proj,participantContactIds:proj.participantContactIds||[],milestones:proj.milestones||[],files:proj.files||[]});setEditing(false);}}>Отмена</button></>

        :<><button className="btn btn-g btn-ic" onClick={()=>setEditing(true)}><I n="edit"/></button><button className="btn btn-g btn-ic btn-d" onClick={del}><I n="trash"/></button><button className="btn btn-g btn-ic" onClick={onClose}><I n="x"/></button></>}

      </div>

    </div>

    <div className="ptabs">{PTABS.map(t=><button key={t.id} className={`ptab${tab===t.id?' active':''}`} onClick={()=>setTab(t.id)}>{t.l}{t.cnt!=null&&<span className="c">{t.cnt}</span>}</button>)}</div>

    <div className="pb">

      {tab==='info'&&<>

        <F l="Компания"><div className="fv">{co?.name||<span className="fv dim">—</span>}</div></F>

        <div className="frow">

          <F l="Этап">{editing?<select className="sel" value={form.stage||'Новый'} onChange={e=>setForm({...form,stage:e.target.value})}>{PROJ_ST.map(s=><option key={s} value={s}>{s}</option>)}</select>:<div className="fv"><SBadge v={proj.stage||'Новый'}/></div>}</F>

          <F l="Бюджет (₽)">{editing?<input className="inp" type="number" value={form.budget||0} onChange={e=>setForm({...form,budget:parseFloat(e.target.value)||0})}/>:<div className="fv">{proj.budget?`${proj.budget.toLocaleString('ru-RU')} ₽`:<span className="fv dim">—</span>}</div>}</F>

        </div>

        <div className="frow">

          <F l="Дата начала">{editing?<input className="inp" type="date" value={form.startDate||''} onChange={e=>setForm({...form,startDate:e.target.value})}/>:<div className="fv">{proj.startDate||<span className="fv dim">—</span>}</div>}</F>

          <F l="Дедлайн">{editing?<input className="inp" type="date" value={form.endDate||''} onChange={e=>setForm({...form,endDate:e.target.value})}/>:<div className="fv">{proj.endDate||<span className="fv dim">—</span>}</div>}</F>

        </div>

        <F l="Описание">{editing?<textarea className="txa" value={form.description||''} onChange={e=>setForm({...form,description:e.target.value})}/>:<div className="fv" style={{whiteSpace:'pre-wrap'}}>{proj.description||<span className="fv dim">—</span>}</div>}</F>

        {form.milestones.length>0&&<F l="Прогресс"><div style={{display:'flex',alignItems:'center',gap:10}}><div className="pbar-w" style={{flex:1}}><div className="pbar" style={{width:`${mileProg}%`}}/></div><span style={{fontFamily:'Geist Mono,monospace',fontSize:12}}>{mileProg}%</span></div></F>}

        {proj.createdAt&&<div className="date-stamp">Создан: {fmtDate(proj.createdAt)}</div>}

      </>}

      {tab==='participants'&&<>

        <div className="stitle">Участники проекта</div>

        {editing&&<div style={{display:'flex',flexWrap:'wrap',gap:6,padding:10,border:'1px solid var(--border)',borderRadius:'var(--r)',marginBottom:12,background:'var(--bg-card)'}}>

          {available.length===0?<span className="fv dim">Нет контактов</span>

          :available.map(c=><button key={c.id} onClick={()=>togP(c.id)} className="tagbtn" style={form.participantContactIds.includes(c.id)?{background:'var(--text)',color:'#fff',borderColor:'transparent'}:{}}>{c.name}</button>)}

        </div>}

        {participants.length===0?<div className="empty" style={{padding:'36px 0'}}><div className="et" style={{fontSize:17}}>Участников нет</div></div>

        :participants.map(c=><div key={c.id} className="card lnk" onClick={()=>onContact(c.id)}><div className="ct">{c.name}</div><div className="cs2">{c.position||'—'}</div></div>)}

      </>}

      {tab==='milestones'&&<>

        <div className="stitle">Этапы {editing&&<button className="btn btn-p btn-sm" onClick={addMile}><I n="plus" s={12}/> Добавить</button>}</div>

        {form.milestones.length===0?<div className="empty" style={{padding:'36px 0'}}><div className="et" style={{fontSize:17}}>Этапов нет</div></div>

        :form.milestones.map(m=><div key={m.id} className="tr">

          <div className={`tck${m.done?' done':''}`} onClick={()=>setForm({...form,milestones:form.milestones.map(x=>x.id===m.id?{...x,done:!x.done}:x)})}>

            {m.done&&<svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3"><polyline points="20 6 9 17 4 12"/></svg>}

          </div>

          <div className="tc3"><div className={`tt${m.done?' done':''}`}>{m.title}</div></div>

          {editing&&<button className="btn btn-g btn-ic btn-sm btn-d" onClick={()=>setForm({...form,milestones:form.milestones.filter(x=>x.id!==m.id)})}><I n="trash" s={13}/></button>}

        </div>)}

      </>}

      {tab==='files'&&<>

        <div className="stitle">Документы</div>

        <FilesSection files={form.files||[]} onChange={files=>setForm({...form,files})}/>

        {editing&&<div style={{marginTop:10,fontSize:12,color:'var(--mu)'}}>Не забудьте нажать «Сохранить»</div>}

      </>}

    </div>

  </Ov>;

}



/* ══ Tasks ══ */

function Tasks({data,upd,onSel,bang,onOpenAction}) {

  const [flt,setFlt]=useState('open');

  const [type,setType]=useState('all'); 

  

  const list=useMemo(()=>{

    let items = [];

    

    if(type==='all'||type==='tasks') {

      const tasks = data.tasks.map(t=>({...t,itemType:'task'}));

      items = [...items, ...tasks];

    }

    

    if(type==='all'||type==='actions') {

      const plannedActions = data.actions

        .filter(a=>a.planned)

        .map(a=>({...a,itemType:'action',completed:false}));

      items = [...items, ...plannedActions];

    }

    

    if(flt==='open') items=items.filter(t=>!t.completed);

    if(flt==='done') items=items.filter(t=>t.completed);

    

    return items.sort((a,b)=>{

      if(a.completed!==b.completed) return a.completed?1:-1;

      const dateA = a.itemType==='task'?(a.deadline||''):(a.plannedDate||'');

      const dateB = b.itemType==='task'?(b.deadline||''):(b.plannedDate||'');

      if(!dateA&&!dateB) return 0;

      if(!dateA) return 1;

      if(!dateB) return -1;

      return dateA.localeCompare(dateB);

    });

  },[data.tasks,data.actions,flt,type]);

  

  const coN=id=>data.companies.find(c=>c.id===id)?.name;

  const prN=id=>data.projects.find(p=>p.id===id)?.title;

  const contN=id=>data.contacts.find(c=>c.id===id)?.name;

  

  const add=()=>{const t=prompt('Задача:');if(!t)return;const id=nid(data.tasks);upd(p=>({...p,tasks:[{id,title:t,companyId:null,projectId:null,deadline:'',priority:'Средний',completed:false,description:'',createdAt:now()},...p.tasks]}));onSel(id);};

  const tog=item=>{

    if(item.itemType==='task') {

      upd(p=>({...p,tasks:p.tasks.map(x=>x.id===item.id?{...x,completed:!x.completed}:x)}));

    }

  };

  

  const handleItemClick=(item)=>{

    if(item.itemType==='task') onSel(item.id);

    else if(item.itemType==='action') onOpenAction(item.id);

  };

  

  return <>

    <div className="ph">

      <div>

        <div className="pt">Задачи</div>

        <div className="pm">{list.length} {flt==='open'?'открытых':flt==='done'?'завершённых':'всего'}</div>

      </div>

      <button className="btn btn-p" onClick={add}><I n="plus" s={14}/> Новая задача</button>

    </div>

    <div className="filters">

      <select className="flt" value={type} onChange={e=>setType(e.target.value)}>

        <option value="all">Всё (Задачи + Действия)</option>

        <option value="tasks">Только Задачи</option>

        <option value="actions">Только Планы (звонки/встречи)</option>

      </select>

      <select className="flt" value={flt} onChange={e=>setFlt(e.target.value)}>

        <option value="open">Открытые</option>

        <option value="done">Выполненные</option>

        <option value="all">Все</option>

      </select>

    </div>

    <div className="tw">

      {list.length===0?<div className="empty"><div className="et">Ничего нет</div><div className="es">Создайте задачу или запланируйте действие</div></div>

      :list.map(item=><div key={`${item.itemType}-${item.id}`} className="tr">

        {item.itemType==='task' ? (

          <div className={`tck${item.completed?' done':''}`} onClick={e=>{e.stopPropagation();tog(item);}}>

            {item.completed&&<svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3"><polyline points="20 6 9 17 4 12"/></svg>}

          </div>

        ) : (

          <div style={{width:18,height:18,flexShrink:0,display:'flex',alignItems:'center',justifyContent:'center',marginTop:1}}>

            <span className={`atype at-${item.type}`} style={{fontSize:9,padding:'1px 4px'}}>{item.type[0]}</span>

          </div>

        )}

        <div className="tc3" onClick={()=>handleItemClick(item)} style={{cursor:'pointer'}}>

          <div className={`tt${item.completed?' done':''}`}>

            {item.itemType==='task' ? item.title : item.content.split('\n')[0]}

          </div>

          <div className="tm">

            {item.itemType==='task' ? (

              <>

                {item.deadline&&<span>📅 {fmtDate(item.deadline)}</span>}

                {item.priority&&<span>⚡ {item.priority}</span>}

                {item.companyId&&coN(item.companyId)&&<span>🏢 {coN(item.companyId)}</span>}

                {item.projectId&&prN(item.projectId)&&<span>📁 {prN(item.projectId)}</span>}

              </>

            ) : (

              <>

                <span className={`atype at-${item.type}`}>{item.type}</span>

                {item.plannedDate&&<span>📅 {fmtDate(item.plannedDate)}</span>}

                {item.companyId&&coN(item.companyId)&&<span>🏢 {coN(item.companyId)}</span>}

                {item.contactId&&contN(item.contactId)&&<span>👤 {contN(item.contactId)}</span>}

              </>

            )}

          </div>

        </div>

      </div>)}

    </div>

  </>;

}



function TaskPanel({task,data,upd,bang,onClose}) {

  const [form,setForm]=useState({...task});

  useEffect(()=>setForm({...task}),[task.id]);

  

  const save=()=>{upd(p=>({...p,tasks:p.tasks.map(t=>t.id===task.id?form:t)}));bang('Сохранено');onClose();};

  const del=()=>{if(!confirm('Удалить задачу?'))return;upd(p=>({...p,tasks:p.tasks.filter(t=>t.id!==task.id)}));onClose();bang('Удалено');};

  const complete=()=>{

    upd(p=>({...p,tasks:p.tasks.map(t=>t.id===task.id?{...form,completed:true}:t)}));

    bang('Задача выполнена');

    onClose();

  };

  

  const company = task.companyId ? data.companies.find(c=>c.id===task.companyId) : null;

  const contact = task.contactId ? data.contacts.find(c=>c.id===task.contactId) : null;

  

  return <Ov onClose={onClose}>

    <div className="ph2">

      <div className="pt2"><input value={form.title||''} onChange={e=>setForm({...form,title:e.target.value})} placeholder="Название задачи"/></div>

      <div className="pa">

        <button className="btn btn-p btn-sm" onClick={save}><I n="save" s={13}/> Сохранить</button>

        <button className="btn btn-g btn-ic btn-d" onClick={del}><I n="trash"/></button>

        <button className="btn btn-g btn-ic" onClick={onClose}><I n="x"/></button>

      </div>

    </div>

    <div className="pb">

      {!form.completed && (

        <button 

          className="btn btn-p" 

          style={{width:'100%', fontSize:16, padding:'14px 20px', justifyContent:'center', marginBottom:18, background:'var(--green)', borderColor:'var(--green)'}} 

          onClick={complete}>

          ✓ ВЫПОЛНИТЬ ЗАДАЧУ

        </button>

      )}



      {form.completed && (

        <div style={{padding:'10px 14px',background:'var(--gbg)',color:'var(--green)',borderRadius:'var(--r)',fontSize:14,fontWeight:500,marginBottom:18,textAlign:'center'}}>

          ✅ Задача выполнена

        </div>

      )}



      <div className="frow">

        <F l="Тип задачи"><select className="sel" value={form.type||'Связаться'} onChange={e=>setForm({...form,type:e.target.value})}><option>Связаться</option><option>Встреча</option><option>Письмо</option><option>Презентация</option><option>Документы</option><option>Другое</option></select></F>

        <F l="Приоритет"><select className="sel" value={form.priority||'Средний'} onChange={e=>setForm({...form,priority:e.target.value})}><option>Высокий</option><option>Средний</option><option>Низкий</option></select></F>

      </div>



      <F l="Дата (дедлайн / перенос)">

        <input className="inp" type="datetime-local" value={(form.deadline||'').slice(0,16)} onChange={e=>setForm({...form,deadline:e.target.value?new Date(e.target.value).toISOString():null})}/>

      </F>



      {company && <F l="Компания"><div className="fv">{company.name}</div></F>}

      {contact && <F l="Контакт"><div className="fv">{contact.name}{contact.position?' · '+contact.position:''}</div></F>}

      

      <F l="Описание / Суть задачи">

        <textarea className="txa" value={form.description||''} onChange={e=>setForm({...form,description:e.target.value})} placeholder="Детали задачи..." style={{minHeight:60}}/>

      </F>

      

      <F l="Результат выполнения (заполняется перед закрытием)">

        <textarea className="txa" value={form.result||''} onChange={e=>setForm({...form,result:e.target.value})} placeholder="Пустое поле: Что было сделано, договорённости, следующие шаги..." style={{minHeight:100}}/>

      </F>

      

      {task.createdAt&&<div className="date-stamp" style={{marginTop:12}}>Создана: {fmtDate(task.createdAt)}</div>}

    </div>

  </Ov>;

}



/* ══ Action Panel ══ */

function ActionPanel({action,data,upd,bang,onClose}) {

  const [form,setForm]=useState({...action});

  const [showReport,setShowReport]=useState(false);

  const [report,setReport]=useState('');

  

  useEffect(()=>setForm({...action}),[action.id]);



  const company = action.companyId ? data.companies.find(c=>c.id===action.companyId) : null;

  const contact = action.contactId ? data.contacts.find(c=>c.id===action.contactId) : null;

  const project = action.projectId ? data.projects.find(p=>p.id===action.projectId) : null;



  const save = () => {

    upd(p=>({...p,actions:p.actions.map(a=>a.id===action.id?form:a)}));

    bang('Сохранено');

    onClose();

  };



  const del = () => {

    if(!confirm('Удалить это действие?')) return;

    upd(p=>({...p,actions:p.actions.filter(a=>a.id!==action.id)}));

    onClose();

    bang('Удалено');

  };



  const complete = () => {

    if(!report.trim()) {

      alert('Введите отчет о выполнении');

      return;

    }

    upd(p=>({...p,actions:p.actions.map(a=>a.id===action.id?{...a,planned:false,date:now(),content:a.content+'\n\n[Отчет]\n'+report}:a)}));

    bang('Действие завершено');

    onClose();

  };



  return <Ov onClose={onClose}>

    <div className="ph2">

      <div className="pt2">{action.planned?'Запланировано':'Выполнено'}: {action.type}</div>

      <div className="pa">

        {action.planned && !showReport && <button className="btn btn-p btn-sm" onClick={()=>setShowReport(true)}><I n="check" s={13}/> Завершить</button>}

        {!showReport && <button className="btn btn-p btn-sm" onClick={save}><I n="save" s={13}/> Сохранить</button>}

        {!showReport && <button className="btn btn-g btn-ic btn-d" onClick={del}><I n="trash"/></button>}

        <button className="btn btn-g btn-ic" onClick={onClose}><I n="x"/></button>

      </div>

    </div>

    <div className="pb">

      {showReport ? <>

        <div style={{marginBottom:12,padding:'10px 12px',background:'var(--gbg)',borderRadius:'var(--rm)',fontSize:13}}>

          ✅ Отметьте действие как выполненное и добавьте отчет

        </div>

        <F l="Отчет о выполнении *">

          <textarea className="txa" autoFocus value={report} onChange={e=>setReport(e.target.value)} placeholder="Что было сделано, договорились, следующие шаги..." style={{minHeight:120}}/>

        </F>

        <div className="df">

          <button className="btn btn-g" onClick={()=>setShowReport(false)}>Отмена</button>

          <button className="btn btn-p" onClick={complete}><I n="check" s={13}/> Завершить действие</button>

        </div>

      </> : <>

        <F l="Тип"><select className="sel" value={form.type} onChange={e=>setForm({...form,type:e.target.value})}>{ACT_T.map(t=><option key={t} value={t}>{t}</option>)}</select></F>

        <F l={action.planned?'Запланировано на':'Дата'}>

          <input className="inp" type="datetime-local" value={(action.planned?action.plannedDate:action.date||'').slice(0,16)} onChange={e=>setForm(action.planned?{...form,plannedDate:new Date(e.target.value).toISOString()}:{...form,date:new Date(e.target.value).toISOString()})}/>

        </F>

        {company && <F l="Компания"><div className="fv">{company.name}</div></F>}

        {contact && <F l="Контакт"><div className="fv">{contact.name}{contact.position?' · '+contact.position:''}</div></F>}

        {project && <F l="Проект"><div className="fv">{project.title}</div></F>}

        <F l="Содержание"><textarea className="txa" value={form.content} onChange={e=>setForm({...form,content:e.target.value})} style={{minHeight:120}}/></F>

        {action.createdAt&&<div className="date-stamp">Создано: {fmtDate(action.createdAt)}</div>}

      </>}

    </div>

  </Ov>;

}



/* ══ Tag Filter Panel ══ */

function TagFilterPanel({data,upd,onSelect,onClose,bang,selectedTagIds}) {

  const sel = selectedTagIds||[];

  const del=id=>{

    if(!confirm('Удалить тег со всех компаний?'))return;

/* ══ Excel CSV Import ══ */

function XlsxImport({data,upd,onClose,bang}) {

  const [preview,setPreview]=useState(null);

  const [mapping,setMapping]=useState({});

  const [rawRows,setRawRows]=useState([]);

  const [headers,setHeaders]=useState([]);

  const ref=useRef();

  const FIELDS=[{k:'name',l:'Компания *',req:true},{k:'inn',l:'ИНН'},{k:'city',l:'Город'},{k:'phone',l:'Телефон'},{k:'email',l:'Email'},{k:'website',l:'Сайт'},{k:'role',l:'Роль компании'},{k:'industry',l:'Отрасль'},{k:'description',l:'Что делает компания'},{k:'whyRelevant',l:'Почему релевантна теме'},{k:'processes',l:'Вероятные процессы'},{k:'applicationPoints',l:'Точки применения'},{k:'solutionInnomatec',l:'Решение Innomatec'},{k:'solutionLangAn',l:'Решение LangAn'},{k:'priority',l:'Приоритет'},{k:'inclusionBasis',l:'Основание включения'},{k:'source',l:'Источник'},{k:'verificationStatus',l:'Статус верификации'},{k:'comment',l:'Комментарий'},{k:'searchTheme',l:'Поисковая тема'}];

  const autoMap=hdrs=>{const m={};if(hdrs.includes('Компания'))m.name='Компания';if(hdrs.includes('Роль компании'))m.role='Роль компании';if(hdrs.includes('Что делает компания'))m.description='Что делает компания';if(hdrs.includes('Почему релевантна теме'))m.whyRelevant='Почему релевантна теме';if(hdrs.includes('Вероятные процессы'))m.processes='Вероятные процессы';if(hdrs.includes('Вероятные точки применения решений'))m.applicationPoints='Вероятные точки применения решений';if(hdrs.includes('Подходящее решение (Компания 1)'))m.solutionInnomatec='Подходящее решение (Компания 1)';if(hdrs.includes('Подходящее решение (Компания 2)'))m.solutionLangAn='Подходящее решение (Компания 2)';if(hdrs.includes('Основание включения'))m.inclusionBasis='Основание включения';if(hdrs.includes('Поисковый запрос / тема'))m.searchTheme='Поисковый запрос / тема';if(hdrs.includes('Телефон'))m.phone='Телефон';if(hdrs.includes('Сайт'))m.website='Сайт';if(hdrs.includes('Город'))m.city='Город';if(hdrs.includes('Приоритет'))m.priority='Приоритет';if(hdrs.includes('Комментарий'))m.comment='Комментарий';if(hdrs.includes('Источник'))m.source='Источник';if(hdrs.includes('Статус проверки'))m.verificationStatus='Статус проверки';if(hdrs.includes('Электронная почта'))m.email='Электронная почта';if(hdrs.includes('Отрасль'))m.industry='Отрасль';else if(hdrs.includes('Отрасли'))m.industry='Отрасли';return m;};

  const readFile=f=>{const r=new FileReader();r.onload=e=>{try{const text=e.target.result;const lines=text.split('\n').filter(l=>l.trim());if(lines.length<2){alert('Файл пустой');return;}const sep=lines[0].includes('\t')?'\t':',';const parseRow=row=>{const res=[];let cur='';let inQ=false;for(let i=0;i<row.length;i++){if(row[i]==='"'&&!inQ){inQ=true;}else if(row[i]==='"'&&inQ&&row[i+1]==='"'){cur+='"';i++;}else if(row[i]==='"'&&inQ){inQ=false;}else if(row[i]===sep&&!inQ){res.push(cur.trim());cur='';}else{cur+=row[i];}}res.push(cur.trim());return res;};const hdrs=parseRow(lines[0]);const rows=lines.slice(1).map(l=>parseRow(l));setHeaders(hdrs);setRawRows(rows);setMapping(autoMap(hdrs));setPreview(rows.slice(0,3).map(r=>{const o={};hdrs.forEach((h,i)=>o[h]=r[i]||'');return o;}));}catch(err){alert('Ошибка: '+err.message);}};r.readAsText(f,'utf-8');};

  const doImport=()=>{

    if(!mapping.name){alert('Не выбрана колонка "Компания"');return;}

    let added=0,dupes=0;

    const newCos=[...data.companies];

    const newCustom=[...(data.customIndustries||[])];

    const knownLC = new Set([...BASE_INDS, ...newCustom].map(s=>s.toLowerCase()));

    rawRows.forEach(row=>{

      const get=k=>mapping[k]?safe(row[headers.indexOf(mapping[k])]):'';

      const name=get('name');

      if(!name)return;

      const inn=get('inn');

      const dup=newCos.find(c=>(inn&&c.inn&&c.inn===inn)||normName(c.name)===normName(name));

      if(dup){dupes++;return;}

      // парсим отрасли (поддерживаем разделители ; , |)

      const indRaw=get('industry');

      const inds=indRaw

        ? indRaw.split(/[;|]|,(?=\s*[А-ЯA-Z])/).map(s=>s.trim()).filter(Boolean)

        : [];

      // регистрируем новые в customIndustries

      inds.forEach(i=>{

        if(!knownLC.has(i.toLowerCase())){

          newCustom.push(i);

          knownLC.add(i.toLowerCase());

        }

      });

      const priority=get('priority')||'B';

      newCos.push({id:nid(newCos),name,inn,city:get('city'),phone:get('phone'),email:get('email'),website:get('website'),role:get('role'),description:get('description'),whyRelevant:get('whyRelevant'),processes:get('processes'),applicationPoints:get('applicationPoints'),solutionInnomatec:get('solutionInnomatec'),solutionLangAn:get('solutionLangAn'),priority:['A','B','C'].includes(priority)?priority:'B',applicability:'',searchTheme:get('searchTheme'),inclusionBasis:get('inclusionBasis'),source:get('source'),verificationStatus:get('verificationStatus'),comment:get('comment'),status:'Лид',industries:inds,industry:inds[0]||'',tags:[],createdAt:now()});

      added++;

    });

    upd(p=>({...p,companies:newCos,customIndustries:newCustom}));

    onClose();

    bang(`Импортировано: ${added}, пропущено дублей: ${dupes}`);

  };

  return <div className="dlg-ov" onClick={onClose}><div className="dlg" style={{maxWidth:580,width:'94vw'}} onClick={e=>e.stopPropagation()}>

    <div className="dh"><div style={{fontFamily:'Instrument Serif,serif',fontSize:19}}>Импорт из CSV</div><button className="btn btn-g btn-ic" onClick={onClose}><I n="x"/></button></div>

    <div className="db">

      {!preview?<><div className="fdrop" onClick={()=>ref.current?.click()} onDragOver={e=>e.preventDefault()} onDrop={e=>{e.preventDefault();const f=e.dataTransfer.files[0];if(f)readFile(f);}}>

        <I n="xlsx" s={22}/><div style={{marginTop:7,fontWeight:500}}>Перетащите CSV или нажмите</div>

        <div style={{fontSize:12,color:'var(--so)',marginTop:4}}>Excel → Файл → Сохранить как → CSV UTF-8</div>

      </div>

      <input type="file" ref={ref} accept=".csv,.txt" style={{display:'none'}} onChange={e=>{const f=e.target.files[0];if(f)readFile(f);e.target.value='';}}/>

      </>:<>

        <div style={{marginBottom:10,padding:'8px 12px',background:'var(--gbg)',borderRadius:'var(--r)',fontSize:12,color:'var(--green)'}}>✅ {rawRows.length} строк · {headers.length} колонок</div>

        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:5,marginBottom:10}}>

          {FIELDS.map(f=><div key={f.k}><div style={{fontSize:9,fontFamily:'Geist Mono,monospace',color:'var(--so)',textTransform:'uppercase',marginBottom:2}}>{f.l}</div>

            <select className="sel" style={{fontSize:12,padding:'3px 22px 3px 7px'}} value={mapping[f.k]||''} onChange={e=>setMapping({...mapping,[f.k]:e.target.value})}><option value="">—</option>{headers.map(h=><option key={h} value={h}>{h}</option>)}</select>

          </div>)}

        </div>

        {preview&&<div style={{marginBottom:10}}><div style={{fontSize:10,fontFamily:'Geist Mono,monospace',color:'var(--mu)',textTransform:'uppercase',marginBottom:6}}>Предпросмотр</div>

          {preview.map((row,i)=><div key={i} style={{fontSize:12,padding:'5px 10px',background:'var(--bg)',borderRadius:'var(--r)',marginBottom:3,border:'1px solid var(--border)'}}><strong>{mapping.name?row[mapping.name]:'?'}</strong> · {mapping.city?row[mapping.city]:''}</div>)}

        </div>}

        <button className="btn btn-g btn-sm" onClick={()=>setPreview(null)}>← Другой файл</button>

      </>}

    </div>

    <div className="df"><button className="btn btn-g" onClick={onClose}>Отмена</button>{preview&&<button className="btn btn-p" onClick={doImport}><I n="ul" s={13}/> Импортировать</button>}</div>

  </div></div>;

}

/* ══ Calendar Picker для планирования действий ══ */

function CalendarPicker({value,onChange,actions}) {

  const [viewDate,setViewDate]=useState(()=>{

    if(value) return new Date(value);

    return new Date();

  });

  const [selectedDate,setSelectedDate]=useState(()=>value?new Date(value):null);

  const [time,setTime]=useState(()=>{

    if(value) {

      const d=new Date(value);

      return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;

    }

    return '09:00';

  });

  const [quickFilter,setQuickFilter]=useState(null);

  

  const today=new Date();

  today.setHours(0,0,0,0);

  

  const handleQuickSelect=(days)=>{

    const d=new Date();

    d.setDate(d.getDate()+days);

    d.setHours(0,0,0,0);

    setViewDate(new Date(d));

    setSelectedDate(d);

    setQuickFilter(days);

  };

  

  const handleDateClick=(day)=>{

    setSelectedDate(day);

    setQuickFilter(null);

    const [h,m]=time.split(':');

    const newDate=new Date(day);

    newDate.setHours(parseInt(h),parseInt(m),0,0);

    onChange(newDate.toISOString().slice(0,16));

  };

  

  const handleTimeChange=(newTime)=>{

    setTime(newTime);

    if(selectedDate) {

      const [h,m]=newTime.split(':');

      const newDate=new Date(selectedDate);

      newDate.setHours(parseInt(h),parseInt(m),0,0);

      onChange(newDate.toISOString().slice(0,16));

    }

  };

  

  const year=viewDate.getFullYear();

  const month=viewDate.getMonth();

  const firstDay=new Date(year,month,1);

  const lastDay=new Date(year,month+1,0);

  const daysInMonth=lastDay.getDate();

  const startDay=firstDay.getDay();

  const prevMonthDays=new Date(year,month,0).getDate();

  

  const days=[];

  for(let i=startDay-1;i>=0;i--){

    const d=new Date(year,month-1,prevMonthDays-i);

    days.push({date:d,isOther:true});

  }

  for(let i=1;i<=daysInMonth;i++){

    const d=new Date(year,month,i);

    days.push({date:d,isOther:false});

  }

  const remaining=42-days.length;

  for(let i=1;i<=remaining;i++){

    const d=new Date(year,month+1,i);

    days.push({date:d,isOther:true});

  }

  

  const monthName=viewDate.toLocaleString('ru-RU',{month:'long',year:'numeric'});

  

  const hasEvent=(day)=>{

    if(!actions) return false;

    const dayStr=day.toISOString().slice(0,10);

    return actions.some(a=>a.plannedDate&&a.plannedDate.slice(0,10)===dayStr);

  };

  

  const isToday=(day)=>{

    return day.getTime()===today.getTime();

  };

  

  const isSelected=(day)=>{

    return selectedDate&&day.getTime()===selectedDate.getTime();

  };

  

  return <div className="calendar-picker">

    <div className="cal-sidebar">

      <div className={`cal-quick${quickFilter===0?' active':''}`} onClick={()=>handleQuickSelect(0)}>Сегодня</div>

      <div className={`cal-quick${quickFilter===1?' active':''}`} onClick={()=>handleQuickSelect(1)}>Через 15 минут</div>

      <div className={`cal-quick${quickFilter===1?' active':''}`} onClick={()=>handleQuickSelect(1)}>Через 30 минут</div>

      <div className={`cal-quick${quickFilter===1?' active':''}`} onClick={()=>handleQuickSelect(1)}>Через час</div>

      <div className={`cal-quick${quickFilter===1?' active':''}`} onClick={()=>handleQuickSelect(1)}>Завтра</div>

      <div className={`cal-quick${quickFilter===7?' active':''}`} onClick={()=>handleQuickSelect(7)}>Через неделю</div>

      <div className={`cal-quick${quickFilter===30?' active':''}`} onClick={()=>handleQuickSelect(30)}>Через месяц</div>

      <div className={`cal-quick${quickFilter===365?' active':''}`} onClick={()=>handleQuickSelect(365)}>Через год</div>

    </div>

    <div className="cal-main">

      <div className="cal-header">

        <div className="cal-month">{monthName}</div>

        <div className="cal-nav">

          <button onClick={()=>setViewDate(new Date(year,month-1,1))}><I n="chevLeft" s={14}/></button>

          <button onClick={()=>setViewDate(new Date())}><I n="clock" s={14}/></button>

          <button onClick={()=>setViewDate(new Date(year,month+1,1))}><I n="chevRight" s={14}/></button>

        </div>

      </div>

      <div className="cal-grid">

        {['Пн','Вт','Ср','Чт','Пт','Сб','Вс'].map(d=><div key={d} className="cal-dow">{d}</div>)}

        {days.map((item,i)=>(

          <div 

            key={i} 

            className={`cal-day${item.isOther?' inactive':''}${isToday(item.date)?' today':''}${isSelected(item.date)?' selected':''}${hasEvent(item.date)?' has-event':''}`}

            onClick={()=>!item.isOther&&handleDateClick(item.date)}

          >

            {item.date.getDate()}

          </div>

        ))}

      </div>

      <div className="cal-time-selector">

        <div className="cal-time-label">Время</div>

        <input 

          type="time" 

          className="cal-time-input" 

          value={time} 

          onChange={e=>handleTimeChange(e.target.value)}

        />

      </div>

    </div>

  </div>;

}



function NewActionForm({contacts,projects,onClose,onSave,defaultContactId,data}){

  const [f,setF]=useState({type:'Звонок',contactId:defaultContactId||contacts?.[0]?.id||'',projectId:'',content:'',planned:false,plannedDate:'',date:new Date().toISOString().slice(0,16)});

  const ok=()=>{if(!f.content.trim()){alert('Опишите событие');return;}onSave({...f,contactId:f.contactId?parseInt(f.contactId):null,projectId:f.projectId?parseInt(f.projectId):null,plannedDate:f.planned&&f.plannedDate?new Date(f.plannedDate).toISOString():null,date:f.planned?null:new Date(f.date).toISOString()});};

  return <Dlg onClose={onClose} title={f.planned?'Запланировать событие':'Записать событие'} wide={f.planned}>

    <div style={{display:'flex',gap:8,marginBottom:12}}>

      <button className={`btn btn-sm${!f.planned?' btn-p':' btn-g'}`} onClick={()=>setF({...f,planned:false})}>Было (история)</button>

      <button className={`btn btn-sm${f.planned?' btn-p':' btn-g'}`} onClick={()=>setF({...f,planned:true})}>Планирую</button>

    </div>

    <F l="Тип"><select className="sel" value={f.type} onChange={e=>setF({...f,type:e.target.value})}>{ACT_T.map(t=><option key={t} value={t}>{t}</option>)}</select></F>

    {f.planned ? (

      <F l="Дата и время события">

        <CalendarPicker 

          value={f.plannedDate} 

          onChange={v=>setF({...f,plannedDate:v})}

          actions={data?.actions||[]}

        />

      </F>

    ) : (

      <F l="Когда было">

        <input className="inp" type="datetime-local" value={f.date} onChange={e=>setF({...f,date:e.target.value})}/>

      </F>

    )}

    {contacts&&contacts.length>0&&<F l="Контакт"><select className="sel" value={f.contactId||''} onChange={e=>setF({...f,contactId:e.target.value})}><option value="">— без контакта —</option>{contacts.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}</select></F>}

    {projects&&projects.length>0&&<F l="Проект (если обсуждается)"><select className="sel" value={f.projectId||''} onChange={e=>setF({...f,projectId:e.target.value})}><option value="">— без проекта —</option>{projects.map(p=><option key={p.id} value={p.id}>{p.title}</option>)}</select></F>}

    <F l={f.planned?'Цель / повестка *':'Итог / заметка *'}><textarea className="txa" autoFocus value={f.content} onChange={e=>setF({...f,content:e.target.value})} placeholder={f.planned?'Что планируете обсудить, цель встречи…':'Что обсудили, договорились, следующие шаги…'} style={{minHeight:90}}/></F>

    <div className="df"><button className="btn btn-g" onClick={onClose}>Отмена</button><button className="btn btn-p" onClick={ok}><I n="save" s={13}/> {f.planned?'Запланировать':'Записать'}</button></div>

  </Dlg>;}



function NewProjectForm({companyId,companyName,contacts,companies,onClose,onSave}){const [f,setF]=useState({title:'',companyId:companyId||null,stage:'Новый',budget:0,startDate:new Date().toISOString().slice(0,10),endDate:'',description:'',participantContactIds:[],milestones:[]});const avail=companyId?(contacts||[]).filter(c=>(c.companyIds||[]).includes(companyId)):(contacts||[]);const togP=id=>setF({...f,participantContactIds:f.participantContactIds.includes(id)?f.participantContactIds.filter(x=>x!==id):[...f.participantContactIds,id]});const ok=()=>{if(!f.title.trim()){alert('Введите название');return;}onSave(f);};

return <Dlg onClose={onClose} title={`Новый проект${companyName?` · ${companyName}`:''}`} wide><F l="Название *"><input className="inp" autoFocus value={f.title} onChange={e=>setF({...f,title:e.target.value})} placeholder="Поставка LTC-802 на ЧАЗ"/></F>{!companyId&&companies&&<F l="Компания"><select className="sel" value={f.companyId||''} onChange={e=>setF({...f,companyId:e.target.value?parseInt(e.target.value):null})}><option value="">—</option>{companies.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}</select></F>}<div className="frow"><F l="Этап"><select className="sel" value={f.stage} onChange={e=>setF({...f,stage:e.target.value})}>{PROJ_ST.map(s=><option key={s} value={s}>{s}</option>)}</select></F><F l="Бюджет (₽)"><input className="inp" type="number" value={f.budget} onChange={e=>setF({...f,budget:parseFloat(e.target.value)||0})}/></F></div><div className="frow"><F l="Начало"><input className="inp" type="date" value={f.startDate} onChange={e=>setF({...f,startDate:e.target.value})}/></F><F l="Дедлайн"><input className="inp" type="date" value={f.endDate} onChange={e=>setF({...f,endDate:e.target.value})}/></F></div><F l="Описание"><textarea className="txa" value={f.description} onChange={e=>setF({...f,description:e.target.value})}/></F>{avail.length>0&&<F l={`Участники (${f.participantContactIds.length})`}><div style={{display:'flex',flexWrap:'wrap',gap:5}}>{avail.map(c=><button key={c.id} className="tagbtn" onClick={()=>togP(c.id)} style={f.participantContactIds.includes(c.id)?{background:'var(--text)',color:'#fff',borderColor:'transparent'}:{}}>{c.name}</button>)}</div></F>}<div className="df"><button className="btn btn-g" onClick={onClose}>Отмена</button><button className="btn btn-p" onClick={ok}><I n="save" s={13}/> Создать</button></div></Dlg>;}



function TagsField({companyTags, pendingTags, allTags, onChange}) {

  const [inputVal, setInputVal] = useState('');

  const allVisible = [...allTags, ...(pendingTags||[])];

  

  const createAndAttach = () => {

    const name = inputVal.trim();

    if(!name) { setInputVal(''); return; }

    

    const existing = allVisible.find(t=>t.name.toLowerCase()===name.toLowerCase());

    if(existing) {

      if(!companyTags.includes(existing.id)) {

        onChange([...companyTags, existing.id], pendingTags||[]);

      }

      setInputVal('');

      return;

    }

    const tempId = 'pending_' + Date.now();

    const newTag = {id: tempId, name};

    const newPending = [...(pendingTags||[]), newTag];

    const newCompanyTags = [...companyTags, tempId];

    onChange(newCompanyTags, newPending);

    setInputVal('');

  };



  const detach = (tagId) => onChange(companyTags.filter(id=>id!==tagId), pendingTags||[]);

  const attach = (tagId) => companyTags.includes(tagId) ? detach(tagId) : onChange([...companyTags, tagId], pendingTags||[]);



  const available = allVisible.filter(t=>!companyTags.includes(t.id));



  return <div>

    {companyTags.length > 0 && <div style={{display:'flex',flexWrap:'wrap',gap:5,marginBottom:8}}>

      {companyTags.map(tid=>{

        const t = allVisible.find(x=>x.id===tid);

        if(!t) return null;

        const isPending = String(tid).startsWith('pending_');

        return <span key={tid} className="tagc on" style={{display:'inline-flex',alignItems:'center',gap:4,opacity:isPending?0.8:1}}>

          {t.name}{isPending&&<span style={{fontSize:10,opacity:.6}}> *</span>}

          <span style={{cursor:'pointer',opacity:.7,fontSize:14,lineHeight:1}} onClick={()=>detach(tid)}>×</span>

        </span>;

      })}

    </div>}

    {companyTags.length > 0 && <div style={{fontSize:11,color:'var(--so)',marginBottom:8}}>* будет сохранено после нажатия «Сохранить»</div>}



    <div style={{display:'flex',gap:6,marginBottom:available.length>0?8:0}}>

      <input

        className="inp"

        style={{flex:1,fontSize:13,padding:'5px 9px'}}

        placeholder="Введите тег и нажмите Enter…"

        value={inputVal}

        onChange={e=>setInputVal(e.target.value)}

        onKeyDown={e=>e.key==='Enter'&&(e.preventDefault(),createAndAttach())}

      />

      {inputVal.trim() && <button className="btn btn-p btn-sm" onClick={createAndAttach}>

        {allVisible.some(t=>t.name.toLowerCase()===inputVal.trim().toLowerCase()) ? 'Привязать' : '+ Создать'}

      </button>}

    </div>



    {available.length > 0 && <div>

      <div style={{fontSize:10,fontFamily:'Geist Mono,monospace',color:'var(--so)',textTransform:'uppercase',letterSpacing:'.06em',marginBottom:5}}>

        Выбрать из базы:

      </div>

      <div style={{display:'flex',flexWrap:'wrap',gap:4}}>

        {available.map(t=>(

          <button key={t.id} className="tagc" onClick={()=>attach(t.id)} title="Добавить тег">{t.name}</button>

        ))}

      </div>

    </div>}

  </div>;

}



function Ov({children,onClose}){return <div className="overlay" onClick={onClose}><div className="panel" onClick={e=>e.stopPropagation()}>{children}</div></div>;}

function Dlg({children,onClose,title,wide}){return <div className="dlg-ov" onClick={onClose}><div className="dlg" style={wide?{maxWidth:560,width:'94vw'}:{}} onClick={e=>e.stopPropagation()}><div className="dh"><div style={{fontFamily:'Instrument Serif,serif',fontSize:19}}>{title}</div><button className="btn btn-g btn-ic" onClick={onClose}><I n="x"/></button></div><div className="db">{children}</div></div></div>;}

function F({l,children}){return <div className="field"><div className="fl">{l}</div>{children}</div>;}
