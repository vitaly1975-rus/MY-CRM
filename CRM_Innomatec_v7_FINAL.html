    if(isNaN(d.getTime())) return String(iso);
    return d.toLocaleString('ru-RU',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'});
  } catch(e) { return String(iso); }
};

const fmtShort = iso => {
  if(!iso) return '';
  try {
    const d = new Date(iso);
    if(isNaN(d.getTime())) return String(iso);
    return d.toLocaleString('ru-RU',{day:'2-digit',month:'short',year:'numeric'});
  } catch(e) { return String(iso); }
};

/* ── Глубокая нормализация входящих данных ── */
function ensureKeys(p) {
  if (!p) return empty();
  return {
    companies: (p.companies||[]).map(c=>({
      id: c.id ? parseInt(c.id) : Date.now(),
      name: String(c.name || 'Без названия').trim(),
      inn: String(c.inn || '').trim(),
      tags: Array.isArray(c.tags) ? c.tags.map(t => parseInt(t)).filter(Boolean) : [],
      industries: Array.isArray(c.industries) ? c.industries : (c.industry ? [c.industry] : []),
      priority: String(c.priority || 'B').trim(),
      status: String(c.status || 'Лид').trim(),
      applicability: String(c.applicability || '').trim(),
      city: String(c.city || '').trim(),
      role: String(c.role || '').trim(),
      phone: String(c.phone || '').trim(),
      email: String(c.email || '').trim(),
      website: String(c.website || '').trim(),
      description: String(c.description || '').trim(),
      whyRelevant: String(c.whyRelevant || '').trim(),
      processes: String(c.processes || '').trim(),
      applicationPoints: String(c.applicationPoints || '').trim(),
      solutionInnomatec: String(c.solutionInnomatec || '').trim(),
      solutionLangAn: String(c.solutionLangAn || '').trim(),
      inclusionBasis: String(c.inclusionBasis || '').trim(),
      searchTheme: String(c.searchTheme || '').trim(),
      source: String(c.source || '').trim(),
      verificationStatus: String(c.verificationStatus || '').trim(),
      comment: String(c.comment || '').trim(),
      createdAt: c.createdAt || now()
    })),
    contacts:  (p.contacts||[]).map(ct=>({
      id: parseInt(ct.id),
      name: String(ct.name || '').trim(),
      position: String(ct.position || '').trim(),
      companyIds: Array.isArray(ct.companyIds) ? ct.companyIds.map(id => parseInt(id)) : [],
      phones: Array.isArray(ct.phones) ? ct.phones : [],
      emails: Array.isArray(ct.emails) ? ct.emails : [],
      notes: String(ct.notes || '').trim(),
      createdAt: ct.createdAt || now()
    })),
    deals:     (p.deals||[]).map(d=>({
      id: parseInt(d.id),
      title: String(d.title || '').trim(),
      companyId: d.companyId ? parseInt(d.companyId) : null,
      amount: parseFloat(d.amount) || 0,
      stage: String(d.stage || 'Запрос').trim(),
      files: Array.isArray(d.files) ? d.files : [],
      clientContact: d.clientContact ? parseInt(d.clientContact) : null,
      createdAt: d.createdAt || now()
    })),
    projects:  (p.projects||[]).map(pr=>({
      id: parseInt(pr.id),
      title: String(pr.title || '').trim(),
      companyId: pr.companyId ? parseInt(pr.companyId) : null,
      stage: String(pr.stage || 'Новый').trim(),
      files: Array.isArray(pr.files) ? pr.files : [],
      milestones: Array.isArray(pr.milestones) ? pr.milestones : [],
      participantContactIds: Array.isArray(pr.participantContactIds) ? pr.participantContactIds.map(id => parseInt(id)) : [],
      createdAt: pr.createdAt || now()
    })),
    tasks:     (p.tasks||[]).map(t=>({
      id: parseInt(t.id),
      title: String(t.title || '').trim(),
      completed: !!t.completed,
      result: String(t.result || '').trim(),
      deadline: t.deadline || null
    })),
    actions:   (p.actions || p.interactions || []).map(a=>({
      id: parseInt(a.id),
      companyId: a.companyId ? parseInt(a.companyId) : null,
      contactId: a.contactId ? parseInt(a.contactId) : null,
      type: String(a.type || 'Заметка').trim(),
      content: String(a.content || '').trim(),
      planned: !!a.planned,
      date: a.date || null,
      plannedDate: a.plannedDate || null
    })),
    tags:      Array.isArray(p.tags) ? p.tags.map(t=>({id: parseInt(t.id), name: String(t.name).trim()})) : [],
  };
}
function empty() { return {companies:[],contacts:[],deals:[],projects:[],tasks:[],actions:[],tags:[]}; }

function loadData() {
  try {
    const s = localStorage.getItem(SK);
    if(s) { const p=JSON.parse(s); if(p && Array.isArray(p.companies)) return ensureKeys(p); }
  } catch(e){}
  return empty();
}

const PBadge = ({v}) => v ? <span className={`badge ${v==='A'?'ba':v==='B'?'bb':'bc'}`}>{v}</span> : null;
const SBadge = ({v}) => {
  if(!v) return null;
  const m={'Лид':'s-Лид','Переговоры':'s-Переговоры','КП':'s-КП','Договор':'s-Договор','Закрыт':'s-Закрыт','Отказ':'s-Отказ','Запрос':'s-Запрос','Счёт':'s-Счёт','Оплата':'s-Оплата','Новый':'s-Новый','В работе':'s-В-работе','На паузе':'s-На-паузе','Завершён':'s-Завершён'};
  return <span className={`badge ${m[v]||'s-Лид'}`}>{v}</span>;
};
const IndustriesBadges = ({industries=[]}) => <>{(industries||[]).map((ind,i)=><span key={i} className="ind-tag">{ind}</span>)}</>;

   MAIN APP
══════════════════════════════════════════════════════ */
function App() {
  const [data, setData]   = useState(loadData);
  const [tab, setTab]     = useState('companies'); 
  const [openCo, setOpenCo]     = useState(null);
  const [openDeal, setOpenDeal] = useState(null);
  const [openProj, setOpenProj] = useState(null);
  const [openTask, setOpenTask] = useState(null);
  const [openCont, setOpenCont] = useState(null);
  const [openAction, setOpenAction] = useState(null);
  const [showTagsFilter, setShowTagsFilter] = useState(false);
  const [activeTagIds, setActiveTagIds]   = useState([]); 
  const [toast, setToast] = useState(null);
  const fileJsonRef = useRef();

  useEffect(()=>{ try{ localStorage.setItem(SK,JSON.stringify(data)); }catch(e){} },[data]);

  const upd = fn => setData(p=>typeof fn==='function'?fn(p):fn);
  const bang = msg => { setToast(msg); setTimeout(()=>setToast(null),2400); };

  const doExport = () => {
    const b=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
    const a=document.createElement('a'); a.href=URL.createObjectURL(b);
    a.download=`crm_backup_${new Date().toISOString().slice(0,10)}.json`; a.click();
    bang('Бэкап базы сохранен');
  };

  const handleJsonImport = e => {
    const f=e.target.files[0]; if(!f) return;
    const r=new FileReader();
    r.onload=ev=>{ try{
      const parsed=JSON.parse(ev.target.result);
      const structured = ensureKeys(parsed);
      setData(structured);
      setActiveTagIds([]);
      setTab('companies');
      bang(`Успешно импортировано: ${structured.companies.length} фирм`);
    }catch(err){ alert('Ошибка чтения JSON структуры: '+err.message); } };
    r.readAsText(f); e.target.value='';
  };

  const selCo   = openCo   ? data.companies.find(x=>x.id===openCo)   : null;
  const selDeal = openDeal ? data.deals.find(x=>x.id===openDeal)     : null;
  const selProj = openProj ? data.projects.find(x=>x.id===openProj)  : null;
  const selTask = openTask ? data.tasks.find(x=>x.id===openTask)     : null;
  const selCont = openCont ? data.contacts.find(x=>x.id===openCont)  : null;
  const selAction = openAction ? data.actions.find(x=>x.id===openAction) : null;

  const activeTasksCount = (data.tasks||[]).filter(t=>!t.completed).length + (data.actions||[]).filter(a=>a.planned).length;

  const TABS=[
    {id:'dashboard',icon:'home',label:'Главная'},
    {id:'companies',icon:'company',label:'Компании',cnt:data.companies.length},
    {id:'contacts',icon:'contact',label:'Контакты',cnt:data.contacts.length},
    {id:'deals',icon:'deal',label:'Сделки',cnt:data.deals.length},
    {id:'projects',icon:'project',label:'Проекты',cnt:data.projects.length},
    {id:'tasks',icon:'task',label:'Задачи',cnt:activeTasksCount},
  ];

  return <>
    <div className="tb">
      <div className="brand">Innomatec / LangAn<span className="brand-s">CRM · Pro v7</span></div>
      <div className="sep"/>
      <nav className="nav">
        {TABS.map(t=>(
          <button key={t.id} className={`nb${tab===t.id?' active':''}`} onClick={()=>setTab(t.id)}>
            <I n={t.icon} s={13}/><span>{t.label}</span>
            {t.cnt!=null&&<span className="c">{t.cnt}</span>}
          </button>
        ))}
      </nav>
      <div className="tba">
        {activeTagIds && activeTagIds.length > 0 && (
          <button className="tag-active-chip" onClick={()=>setActiveTagIds([])}>🏷 Теги: {activeTagIds.length} ×</button>
        )}
        <button className="btn btn-g btn-sm" onClick={()=>setShowTagsFilter(true)}><I n="tag" s={13}/><span>Теги</span></button>
        
        <button className="btn btn-p btn-sm" style={{background:'#2563eb',borderColor:'#2563eb'}} onClick={()=>fileJsonRef.current?.click()}>
          <I n="ul" s={13}/><span>Импорт JSON</span>
        </button>
        <input type="file" ref={fileJsonRef} accept=".json" style={{display:'none'}} onChange={handleJsonImport}/>
        
        <button className="btn btn-sm" onClick={doExport}><I n="dl" s={13}/><span>Скачать бэкап</span></button>
      </div>
    </div>

    <div className="content">
      {data.companies.length === 0 ? (
        <div className="empty" style={{padding:'80px 16px'}}>
          <div style={{fontSize:48, marginBottom:16}}>📂</div>
          <div className="et" style={{fontSize:24}}>Оболочка CRM готова</div>
          <div className="es" style={{maxWidth:440, margin:'0 auto 20px', fontSize:14, color:'var(--mu)'}}>
            Нажмите синюю кнопку **«Импорт JSON»** в панели сверху и выберите файл вашей базы данных.
          </div>
          <button className="btn btn-p" style={{padding:'10px 20px', background:'#2563eb', borderColor:'#2563eb'}} onClick={()=>fileJsonRef.current?.click()}>
            Загрузить бэкап .json
          </button>
        </div>
      ) : (
        <>
          {tab==='dashboard' && <Dashboard data={data} setTab={setTab} onOpenAction={id=>setOpenAction(id)} onSelTask={id=>setOpenTask(id)}/>}
          {tab==='companies' && <Companies data={data} upd={upd} onSel={id=>setOpenCo(id)} bang={bang} activeTagIds={activeTagIds} setActiveTagIds={setActiveTagIds}/>}
          {tab==='contacts'  && <ContactsSearch data={data} onSel={id=>setOpenCont(id)}/>}
          {tab==='deals'     && <Deals data={data} onSel={id=>setOpenDeal(id)}/>}
          {tab==='projects'  && <Projects data={data} onSel={id=>setOpenProj(id)}/>}
          {tab==='tasks'     && <Tasks data={data} onSel={id=>setOpenTask(id)} onOpenAction={id=>setOpenAction(id)}/>}
        </>
      )}
    </div>

    {selCo   && <CoPanel    key={selCo.id}   co={selCo}    data={data} upd={upd} bang={bang} onClose={()=>setOpenCo(null)} onContact={id=>setOpenCont(id)} onDeal={id=>setOpenDeal(id)} onProject={id=>setOpenProj(id)}/>}
    {selDeal && <DealPanel  key={selDeal.id} deal={selDeal} onClose={()=>setOpenDeal(null)}/>}
    {selProj && <ProjPanel  key={selProj.id} proj={selProj} onClose={()=>setOpenProj(null)}/>}
    {selTask && <TaskPanel  key={selTask.id} task={selTask} onClose={()=>setOpenTask(null)}/>}
    {selCont && <ContPanel  key={selCont.id} contact={selCont} onClose={()=>setOpenCont(null)}/>}
    {selAction && <ActionPanel key={selAction.id} action={selAction} onClose={()=>setOpenAction(null)}/>}
    {showTagsFilter && <TagFilterPanel data={data} onClose={()=>setShowTagsFilter(false)} onSelect={id=>{if(id==='__clear__'){setActiveTagIds([]);}else{setActiveTagIds(prev=>(prev||[]).includes(id)?prev.filter(x=>x!==id):[...(prev||[]),id]);}setTab('companies');}} selectedTagIds={activeTagIds}/>}

    {toast && <div className="toast">{toast}</div>}
  </>;
}

/* ── Dashboard ── */
function Dashboard({data,setTab}) {
  const s = useMemo(()=>({
    cos: data.companies.length,
    prA: data.companies.filter(c=>c.priority==='A').length,
    aDl: data.deals.filter(d=>d.stage!=='Закрыт'&&d.stage!=='Отказ').length,
    aPr: data.projects.filter(p=>p.stage!=='Завершён').length,
    inds: Object.entries(data.companies.reduce((m,c)=>{(c.industries||[]).forEach(ind=>{if(ind){m[ind]=(m[ind]||0)+1;}});return m},{})).sort((a,b)=>b[1]-a[1]).slice(0,6),
  }),[data]);

  return <div style={{padding:26}}>
    <div className="pt">Главный дашборд</div>
    <div className="pm" style={{marginBottom:20}}>Статистика импортированной базы данных</div>
    <div className="stats" style={{padding:0, marginBottom:26}}>
      {[['Компаний в базе',s.cos,'companies'],['Категория приоритета A',s.prA,'companies'],['Активные сделки',s.aDl,'deals'],['Проекты внедрения',s.aPr,'projects']].map(([l,v,t])=>(
        <div key={l} className="stat" onClick={()=>setTab(t)}><div className="sl">{l}</div><div className="sv">{v}</div></div>
      ))}

      <thead><tr><th>Отраслевой сектор</th><th style={{width:100,textAlign:'right'}}>Компаний</th><th style={{width:'40%'}}>График</th></tr></thead>

];

const DEFAULT_COLS = ['name','industries','applicability','city','priority','status','tags'];

function CoCell({colId, c, tags, colWidths}) {
  const w = colWidths[colId];
  const style = {width:w||undefined, minWidth:70, verticalAlign:'top'};
  const inds = c.industries || [];

  if(colId==='name') return (
    <td className="cn" style={{...style,minWidth:120}}>
      {c.name || '—'}
      <div className="cs" style={{fontSize:11,color:'var(--mu)',marginTop:2}}>{c.inn?'ИНН '+c.inn:''}{c.role?' · '+c.role:''}</div>
    </td>
  );
  if(colId==='industries') return <td className="cd" style={style}><IndustriesBadges industries={inds}/></td>;
  if(colId==='applicability') return <td className="cd" style={style}>{c.applicability||'—'}</td>;
  if(colId==='city')    return <td className="cd" style={style}>{c.city||'—'}</td>;
  if(colId==='priority') return <td style={style}><PBadge v={c.priority}/></td>;
  if(colId==='status')  return <td style={style}><SBadge v={c.status||'Лид'}/></td>;
  if(colId==='tags')    return (
    <td style={style}>
      <div style={{display:'flex',flexWrap:'wrap',gap:3}}>
        {(c.tags||[]).map(tid=>{
          const t=(tags||[]).find(x=>x.id===tid);
          return t ? <span key={tid} className="badge bt">{t.name}</span> : null;
        })}
      </div>
    </td>
  );
  if(colId==='inn') return <td className="cd" style={style}>{c.inn||'—'}</td>;
  if(colId==='role') return <td className="cd" style={style}>{c.role||'—'}</td>;
  
  if(['description','whyRelevant','processes','applicationPoints','solutionInnomatec','solutionLangAn','comment','verificationStatus'].includes(colId)) {
    return <td className="cd" style={{...style,maxWidth:200}}><div style={{maxHeight:38,overflow:'hidden',textOverflow:'ellipsis',fontSize:12,lineHeight:'1.3'}}>{c[colId]||'—'}</div></td>;
  }
  return <td style={style}>—</td>;
}

function Companies({data,upd,onSel,bang,activeTagIds,setActiveTagIds}) {
  const [q,setQ]           = useState('');
  const [fInd,setFInd]     = useState('');
  const [fPrio,setFPrio]   = useState('');
  const [fSt,setFSt]       = useState('');
  const [showNew,setShowNew]= useState(false);
  const [visibleCols,setVisibleCols] = useState(DEFAULT_COLS);
  const [colWidths] = useState({});
  const [ctxMenu,setCtxMenu]         = useState(null);

  const toggleCol=colId=>setVisibleCols(prev=>prev.includes(colId)?prev.filter(c=>c!==colId):[...prev,colId]);

  const list = useMemo(()=>{
    const ql=q.toLowerCase().trim();
    const safeCompanies = data.companies || [];
    
    return safeCompanies.filter(c=>{
      if(ql){
        const n=String(c.name||'').toLowerCase();
        const ct=String(c.city||'').toLowerCase();
        const inn=String(c.inn||'').toLowerCase();
        const desc=String(c.description||'').toLowerCase();
        if(!n.includes(ql) && !ct.includes(ql) && !inn.includes(ql) && !desc.includes(ql)) return false;
      }
      if(fInd){
        const inds = c.industries || [];
        if(!inds.includes(fInd)) return false;
      }
      if(fPrio && String(c.priority||'B')!==fPrio) return false;
      if(fSt && String(c.status||'Лид')!==fSt) return false;
      
      if(activeTagIds && activeTagIds.length > 0){
        const companyTags = c.tags || [];
        if(!activeTagIds.every(tid => companyTags.includes(tid))) return false;
      }
      return true;
    });
  },[data.companies, q, fInd, fPrio, fSt, activeTagIds]);

  const activeCols = ALL_COLS.filter(c=>c.always || visibleCols.includes(c.id));

  return <>
    <div className="ph">
      <div><div className="pt">Контрагенты и Компании</div><div className="pm">Отображено записей: {list.length} из {data.companies.length}</div></div>
      <button className="btn btn-p" onClick={()=>setShowNew(true)}><I n="plus" s={14}/> Добавить организацию</button>
    </div>

    <div className="filters">
      <div className="sw">
        <I n="search" s={14}/>
        <input className="si" placeholder="Быстрый поиск по названию, ИНН, профилю..." value={q} onChange={e=>setQ(e.target.value)}/>
      </div>
      <select className="flt" value={fInd} onChange={e=>setFInd(e.target.value)}>
        <option value="">Все отрасли</option>
        {INDS.map(i=><option key={i} value={i}>{i}</option>)}
      </select>
      <select className="flt" value={fPrio} onChange={e=>setFPrio(e.target.value)}>
        <option value="">Все приоритеты</option>
        {PRIO.map(p=><option key={p} value={p}>Приоритет {p}</option>)}
      </select>
      <select className="flt" value={fSt} onChange={e=>setFSt(e.target.value)}>
        <option value="">Все статусы</option>
        {CO_ST.map(s=><option key={s} value={s}>{s}</option>)}
      </select>
      {activeTagIds && activeTagIds.length > 0 && <button className="btn btn-sm btn-d" onClick={()=>setActiveTagIds([])}>Сбросить фильтр тегов</button>}
    </div>

    <div className="tw" style={{overflowX:'auto'}}>
      {list.length===0
        ? <div className="empty"><div className="et">Записей не найдено</div><div className="es">Пожалуйста, загрузите валидный бэкап или измените фильтры.</div></div>
        : <table className="tbl" style={{tableLayout:'auto',width:'max-content',minWidth:'100%'}}>
            <thead>
              <tr onContextMenu={e=>{e.preventDefault();setCtxMenu({x:Math.min(e.clientX,window.innerWidth-240),y:e.clientY});}}>
                {activeCols.map(col=>(
                  <th key={col.id}>
                    {col.label}
                    <div className="col-resizer" onClick={e=>e.stopPropagation()}/>
                  </th>
                ))}
              </tr>
            </thead>
            <tbody>
              {list.map(c=>(
                <tr key={c.id} className="row" onClick={()=>onSel(c.id)}>
                  {activeCols.map(col=>(
                    <CoCell key={col.id} colId={col.id} c={c} tags={data.tags} colWidths={colWidths}/>
                  ))}
                </tr>
              ))}
            </tbody>
          </table>}
    </div>

    {ctxMenu && <>
      <div style={{position:'fixed',inset:0,zIndex:499}} onClick={()=>setCtxMenu(null)}/>
      <div style={{position:'fixed',left:ctxMenu.x,top:ctxMenu.y,background:'var(--bg-card)',border:'1px solid var(--border)',borderRadius:'var(--rm)',boxShadow:'var(--shl)',zIndex:500,padding:'6px 0',minWidth:220,maxHeight:380,overflowY:'auto'}}>
        <div style={{padding:'6px 14px 8px',fontFamily:'Geist Mono,monospace',fontSize:10,color:'var(--so)',borderBottom:'1px solid var(--border)',marginBottom:4,textTransform:'uppercase'}}>Колонки интерфейса v7</div>
        {ALL_COLS.map(col=>(
          <div key={col.id} style={{display:'flex',alignItems:'center',gap:10,padding:'6px 14px',cursor:col.always?'default':'pointer'}} onClick={()=>{if(!col.always)toggleCol(col.id);}}>
            <input type="checkbox" checked={col.always || visibleCols.includes(col.id)} disabled={col.always} readOnly/>
            <span style={{fontSize:13}}>{col.label}</span>
          </div>
        ))}
      </div>
    </>}

    {showNew && <NewCoForm onClose={()=>setShowNew(false)} onSave={form=> {
      const id=nid(data.companies);
      upd(p=>({...p,companies:[{id,...form,tags:[],createdAt:now()},...p.companies]}));
      setShowNew(false); onSel(id); bang('Компания успешно добавлена');
    }}/>}
  </>;
}

/* ── New Company Form ── */
function NewCoForm({onClose,onSave}) {
  const [f,setF] = useState({name:'',inn:'',industries:[],applicability:'',city:'',phone:'',email:'',website:'',description:'',priority:'B',status:'Лид'});
  return <div className="dlg-ov" onClick={onClose}><div className="dlg" onClick={e=>e.stopPropagation()} style={{padding:18}}>
    <div className="dh"><div className="pt2">Добавить организацию</div></div>
    <div className="db">
      <F l="Название организации *"><input className="inp" autoFocus value={f.name} onChange={e=>setF({...f,name:e.target.value})}/></F>
      <div className="frow">
        <F l="ИНН"><input className="inp" value={f.inn} onChange={e=>setF({...f,inn:e.target.value})}/></F>
        <F l="Город"><input className="inp" value={f.city} onChange={e=>setF({...f,city:e.target.value})}/></F>
      </div>
      <F l="Применяемость"><input className="inp" value={f.applicability} onChange={e=>setF({...f,applicability:e.target.value})}/></F>
      <F l="Профиль / Краткое описание"><textarea className="txa" value={f.description} onChange={e=>setF({...f,description:e.target.value})}/></F>
      <div style={{marginTop:10, display:'flex', justifyContent:'flex-end', gap:6}}><button className="btn" onClick={onClose}>Отмена</button><button className="btn btn-p" onClick={()=>onSave(f)}>Создать</button></div>
    </div>
  </div></div>;
}

/* ── Company Panel v7 Complete ── */
function CoPanel({co,data,upd,bang,onClose,onContact,onDeal,onProject}) {
  const [editing,setEditing]=useState(false);
  const [form,setForm]=useState({...co});
  const [tab,setTab]=useState('info');

  const contacts=(data.contacts||[]).filter(c=>(c.companyIds||[]).includes(co.id));
  const deals=(data.deals||[]).filter(d=>d.companyId===co.id);
  const projects=(data.projects||[]).filter(p=>p.companyId===co.id);
  const history=(data.actions||[]).filter(a=>a.companyId===co.id).sort((a,b)=>((b.date||b.plannedDate||'')).localeCompare((a.date||a.plannedDate||'')));

  const save=()=>{ upd(p=>({...p,companies:p.companies.map(x=>x.id===co.id?form:x)})); setEditing(false); bang('Сохранено'); };
  
  return <Ov onClose={onClose}>
    <div className="ph2">
      <div className="pt2">{editing?<input value={form.name} onChange={e=>setForm({...form,name:e.target.value})}/>:co.name}</div>
      <div className="pa">
        {editing ? <button className="btn btn-p btn-sm" onClick={save}>Сохранить</button> : <button className="btn btn-g btn-ic" onClick={()=>setEditing(true)}><I n="edit"/></button>}
        <button className="btn btn-g btn-ic" onClick={onClose}><I n="x"/></button>
      </div>
    </div>
    <div className="ptabs">
      {[{id:'info',l:'Карточка'},{id:'contacts',l:'Контакты',cnt:contacts.length},{id:'deals',l:'Сделки',cnt:deals.length},{id:'projects',l:'Проекты',cnt:projects.length},{id:'history',l:'История',cnt:history.length}].map(t=>(
        <button key={t.id} className={`ptab${tab===t.id?' active':''}`} onClick={()=>setTab(t.id)}>{t.l} <span className="c">{t.cnt||0}</span></button>
      ))}
    </div>
    <div className="pb">
      {tab==='info' && <CoInfoTab co={co} form={form} setForm={setForm} editing={editing}/>}
      
      {tab==='contacts' && <div className="cs2">
        {contacts.length===0 ? <div className="empty" style={{padding:20}}>Нет связанных лиц</div> : 
         contacts.map(c=><div key={c.id} className="card lnk" onClick={()=>onContact(c.id)}><strong>{c.name}</strong> — {c.position||'Должность не указана'}</div>)}
      </div>}
      
      {tab==='deals' && <div className="cs2">
        {deals.length===0 ? <div className="empty" style={{padding:20}}>Нет коммерческих сделок</div> : 
         deals.map(d=><div key={d.id} className="card lnk" onClick={()=>onDeal(d.id)}><strong>{d.title}</strong> — <SBadge v={d.stage}/></div>)}
      </div>}
      
      {tab==='projects' && <div className="cs2">
        {projects.length===0 ? <div className="empty" style={{padding:20}}>Нет активных проектов</div> : 
         projects.map(p=><div key={p.id} className="card lnk" onClick={()=>onProject(p.id)}>{p.title} </div>)}
      </div>}
      
      {tab==='history' && <div className="cs2">
        {history.length===0 ? <div className="empty" style={{padding:20}}>История взаимодействий пуста</div> : 
         history.map(a=>(
           <div key={a.id} className="card" style={{borderLeft: a.planned ? '3px solid var(--blue)' : '1px solid var(--border)'}}>
             <div className="ch">
               <span className={`atype at-${a.type||'Заметка'}`}>{a.type||'Заметка'}</span>
               <span className="cm">{fmtDate(a.date || a.plannedDate)}</span>
             </div>
             <p style={{whiteSpace:'pre-wrap', marginTop:4, fontSize:13, color:'var(--text)'}}>{a.content}</p>
           </div>
         ))}
      </div>}
    </div>
  </Ov>;
}

function CoInfoTab({co,form,setForm,editing}) {
  const ev=(k,v)=>setForm({...form,[k]:v});
  const Fv=({k,label,multi=false})=><F l={label}>{editing?(multi?<textarea className="txa" value={form[k]||''} onChange={e=>ev(k,e.target.value)}/>:<input className="inp" value={form[k]||''} onChange={e=>ev(k,e.target.value)}/>):<div className="fv" style={multi?{whiteSpace:'pre-wrap'}:{}}>{co[k]||<span className="fv dim">—</span>}</div>}</F>;
  return <>
    <div className="frow">
      <F l="Приоритет">{editing?<select className="sel" value={form.priority||'B'} onChange={e=>ev('priority',e.target.value)}>{PRIO.map(p=><option key={p} value={p}>{p}</option>)}</select>:<div className="fv"><PBadge v={co.priority}/></div>}</F>
      <F l="Статус">{editing?<select className="sel" value={form.status||'Лид'} onChange={e=>ev('status',e.target.value)}>{CO_ST.map(s=><option key={s} value={s}>{s}</option>)}</select>:<div className="fv"><SBadge v={co.status||'Лид'}/></div>}</F>
    </div>
    <div className="frow"><Fv k="city" label="Город"/><Fv k="inn" label="ИНН"/></div>
    <Fv k="applicability" label="Применяемость продукции"/>
    <Fv k="role" label="Роль компании"/>
    
    <div className="sdiv"><div className="stitle">Бизнес-информация v7</div></div>
    <Fv k="description" label="Что делает компания" multi/>
    <Fv k="whyRelevant" label="Почему релевантна теме" multi/>
    <Fv k="processes" label="Вероятные процессы" multi/>
    <Fv k="applicationPoints" label="Точки применения решений" multi/>
    
    <div className="sdiv"><div className="stitle">Подходящие технологические решения</div></div>
    <Fv k="solutionInnomatec" label="Решение Innomatec" multi/>
    <Fv k="solutionLangAn" label="Решение LangAn" multi/>
    
    <div className="sdiv"><div className="stitle">Дополнительные метаданные</div></div>
    <Fv k="verificationStatus" label="Статус верификации"/>
    <Fv k="comment" label="Комментарий аналитика" multi/>
  </>;
}

/* ── Contacts Search ── */
function ContactsSearch({data,onSel}) {
  const [q,setQ]=useState('');
  const list=(data.contacts||[]).filter(c=>(c.name||'').toLowerCase().includes(q.toLowerCase().trim()));
  return <>
    <div className="ph"><div className="pt">Контакты лиц</div></div>
    <div className="filters" style={{marginBottom:10}}><input className="si" placeholder="Поиск контакта по имени..." value={q} onChange={e=>setQ(e.target.value)}/></div>
    <div className="tw">
      {list.length===0 ? <div className="empty">Контактов нет</div> : 
       list.map(c=><div key={c.id} className="card lnk" onClick={()=>onSel(c.id)}><strong>{c.name}</strong> {c.position ? `— ${c.position}` : ''}</div>)}
    </div>
  </>;
}
function ContPanel({contact,onClose}){ return <Ov onClose={onClose}><div className="ph2"><div className="pt2">{contact.name}</div></div><div className="pb"><F l="Должность"><div className="fv">{contact.position||'—'}</div></F><F l="Заметки/Примечания"><div className="fv" style={{whiteSpace:'pre-wrap'}}>{contact.notes||'—'}</div></F></div></Ov>; }

/* ── Deals ── */
function Deals({data,onSel}) {
  return <>
    <div className="ph"><div className="pt">Сделки Воронка</div></div>
    <div className="kanban">{DEAL_ST.map(s=><div key={s} className="kol">
      <div className="kh"><span className="ktt">{s}</span><span className="kc">{(data.deals||[]).filter(d=>d.stage===s).length}</span></div>
      {(data.deals||[]).filter(d=>d.stage===s).map(d=><div key={d.id} className="kcard" onClick={()=>onSel(d.id)}>{d.title}</div>)}
    </div>)}</div>
  </>;
}
function DealPanel({deal,onClose}){ return <Ov onClose={onClose}><div className="ph2"><div className="pt2">{deal.title}</div></div><div className="pb"><F l="Стадия"><div className="fv"><SBadge v={deal.stage}/></div></F></div></Ov>; }

/* ── Projects ── */
function Projects({data,onSel}) {
  return <>
    <div className="ph"><div className="pt">Проекты</div></div>
    <div className="kanban">{PROJ_ST.map(s=><div key={s} className="kol">
      <div className="kh"><span className="ktt">{s}</span><span className="kc">{(data.projects||[]).filter(p=>p.stage===s).length}</span></div>
      {(data.projects||[]).filter(p=>p.stage===s).map(p=><div key={p.id} className="kcard" onClick={()=>onSel(p.id)}>{p.title}</div>)}
    </div>)}</div>
  </>;
}
function ProjPanel({proj,onClose}){ return <Ov onClose={onClose}><div className="ph2"><div className="pt2">{proj.title}</div></div><div className="pb"><F l="Статус проекта"><div className="fv"><SBadge v={proj.stage}/></div></F></div></Ov>; }

/* ── Tasks ── */
function Tasks({data,onSel,onOpenAction}) {
  const openTasks = (data.tasks||[]).filter(t=>!t.completed);
  const plannedActions = (data.actions||[]).filter(a=>a.planned);
  return <>
    <div className="ph"><div className="pt">Предстоящие дела</div></div>
    <div className="tw">
      <div style={{fontFamily:'Geist Mono,monospace',fontSize:11,color:'var(--mu)',textTransform:'uppercase',marginBottom:8}}>Задачи ({openTasks.length})</div>
      {openTasks.map(t=><div key={t.id} className="card lnk" onClick={()=>onSel(t.id)}>📋 Задача: {t.title}</div>)}
      <div style={{fontFamily:'Geist Mono,monospace',fontSize:11,color:'var(--mu)',textTransform:'uppercase',marginTop:20,marginBottom:8}}>Планируемые действия ({plannedActions.length})</div>
      {plannedActions.map(a=><div key={a.id} className="card lnk" style={{borderLeft:'3px solid var(--blue)'}} onClick={()=>onOpenAction(a.id)}>📞 {a.type}: {a.content} <span style={{float:'right',fontSize:11}}>{fmtShort(a.plannedDate)}</span></div>)}
    </div>
  </>;
}
function TaskPanel({task,onClose}){ return <Ov onClose={onClose}><div className="ph2"><div className="pt2">{task.title}</div></div></Ov>; }
function ActionPanel({action,onClose}){ return <Ov onClose={onClose}><div className="ph2"><div className="pt2">{action.type}</div></div><div className="pb"><div className="fv">{action.content}</div></div></Ov>; }

/* ── Tag Filter Panel ── */
function TagFilterPanel({data,onSelect,onClose,selectedTagIds}) {
  return <div className="dlg-ov" onClick={onClose}><div className="dlg" onClick={e=>e.stopPropagation()}>
    <div className="dh"><div style={{fontFamily:'Instrument Serif,serif',fontSize:19}}>Выбрать тег из базы</div><button className="btn btn-g btn-ic" onClick={onClose}><I n="x"/></button></div>
    <div className="db" style={{display:'flex',flexWrap:'wrap',gap:6,padding:14}}>
      {(data.tags||[]).length===0 ? <div style={{color:'var(--mu)',fontSize:13}}>Теги не найдены.</div> : 
       (data.tags||[]).map(t=>(
        <button key={t.id} className="tagbtn" style={(selectedTagIds||[]).includes(t.id)?{background:'var(--purple)',color:'#fff',borderColor:'transparent'}:{}} onClick={()=>onSelect(t.id)}>{t.name}</button>
      ))}
    </div>
    <div className="df"><button className="btn btn-d btn-sm" onClick={()=>onSelect('__clear__')}>Очистить всё</button><button className="btn btn-p" onClick={onClose}>Применить</button></div>
  </div></div>;
}

function F({l,children}){return <div className="field"><div className="fl">{l}</div>{children}</div>;}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
